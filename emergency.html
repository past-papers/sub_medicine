    <script>
        const quizData = [
            // --- CHEST PAIN & ACS ---
            { id: 1, topic: "Chest Pain & ACS", q: "A case of an elderly man admitted to ER for a medical complaint for which Nitrates (+Aspirin) has been prescribed, after that he developed Hypotension. Which of the following is most likely the reason for this deterioration?", opts: ["A. He recently took PDE-5 inhibitor", "B. Rt. ventricular infarction", "C. Internal Bleeding due to aspirin", "D. Anaphylaxis due to aspirin", "E. Papillary muscle rupture"], ans: 0, exp: "Nitrates and PDE-5 inhibitors both cause profound vasodilation; combining them leads to severe, refractory hypotension." },
            { id: 2, topic: "Chest Pain & ACS", q: "An absolute contraindication to the use of fibrinolytics in ACS?", opts: ["A. Suspected Aortic Dissection", "B. Pregnancy", "C. Previous ischemic stroke", "D. Seizure disorder", "E. Concomitant Warfarin use"], ans: 0, exp: "Fibrinolytics in an aortic dissection would exacerbate severe internal bleeding and are absolutely contraindicated." },
            { id: 3, topic: "Chest Pain & ACS", q: "A female patient presented to the ER with chest pain for 1 hour. An ECG was done & she was diagnosed with STEMI. The best treatment option?", opts: ["A. Aspirin & PCI", "B. Aspirin & thrombolysis", "C. Aspirin alone", "D. Pacemaker"], ans: 0, exp: "Primary Percutaneous Coronary Intervention (PCI) with Aspirin is the gold standard for STEMI if available within the proper timeframe." },
            { id: 4, topic: "Chest Pain & ACS", q: "Case of chest pain with no ECG changes, raised Troponin:", opts: ["A. Stable angina", "B. Unstable angina", "C. STEMI", "D. NSTEMI"], ans: 3, exp: "Raised cardiac biomarkers (Troponin) without ST-segment elevation on ECG is the definition of NSTEMI." },
            { id: 5, topic: "Chest Pain & ACS", q: "A 55-year-old, HTN, DM, Hypercholesterolemia with history of stable angina presented with chest pain radiating to the upper limbs what do you expect to find in ECG:", opts: ["A. Short QT", "B. Normal ECG", "C. Non-specific ST changes", "D. ST depression", "E. ST elevation"], ans: 3, exp: "Subendocardial ischemia (common in angina/NSTEMI exacerbations) typically manifests as ST depression on an ECG." },
            { id: 6, topic: "Chest Pain & ACS", q: "ECG changes in leads I, aVL (V4-V6):", opts: ["A. Anteroseptal", "B. Anterolateral", "C. Lateral", "D. Inferior", "E. Posterior"], ans: 1, exp: "Leads V4-V6 cover the anterior/lateral wall, and I & aVL are high lateral leads. Together they signify an anterolateral pattern." },
            { id: 7, topic: "Chest Pain & ACS", q: "The ideal time period after ER presentation within which percutaneous coronary angioplasty (PCI) should be performed in a patient with STEMI is:", opts: ["A. 15 minutes", "B. 30 minutes", "C. 60 minutes", "D. 90 minutes"], ans: 3, exp: "The target 'Door-to-Balloon' time for PCI in a STEMI patient is within 90 minutes at a PCI-capable center." },
            { id: 8, topic: "Chest Pain & ACS", q: "Best leads presenting the anterior heart:", opts: ["A. I, aVL", "B. V3-V4", "C. V5-V6", "D. V1-V2"], ans: 1, exp: "Leads V3 and V4 best represent the anterior wall of the left ventricle, supplied by the LAD artery." },
            { id: 9, topic: "Chest Pain & ACS", q: "Patient works as a farmer started having chest pain while working, he took a break for 10 minutes then resumed to work. He started having the same pain again:", opts: ["A. Angina", "B. Abnormal chest discomfort", "C. Acute pericarditis", "D. Nonspecific ECG changes"], ans: 0, exp: "Chest pain that is reliably precipitated by exertion and relieved by rest is the classic presentation of stable angina." },
            { id: 11, topic: "Chest Pain & ACS", q: "Patient has STEMI, came ER 30 minutes ago, the closest center was 45 minutes away, it was decided that he will be transferred and get a PCI, time from door to PCI should be within:", opts: ["A. 45 mins", "B. 60 mins", "C. 90 mins", "D. 120 minutes"], ans: 3, exp: "If a STEMI patient presents to a non-PCI center and requires transfer, the goal is 'Door-in to Door-out' and ultimately balloon inflation within 120 minutes." },
            { id: 12, topic: "Chest Pain & ACS", q: "The first step of development of ACS?", opts: ["A. Plaque rupture", "B. Plaque erosion", "C. Platelet activation", "D. None of the above"], ans: 0, exp: "The pathophysiological cascade of Acute Coronary Syndrome almost universally begins with the rupture or erosion of an atherosclerotic plaque." },
            { id: 13, topic: "Chest Pain & ACS", q: "You're in an ambulance, patient with STEMI, best treatment?", opts: ["A. Fibrinolytics within 15 minutes", "B. Go to nearest hospital with CABG capacity", "C. PCI with fibrinolytics within 15 minutes", "D. PCI within 15 minutes"], ans: 3, exp: "If accessible extremely quickly, PCI is the superior definitive treatment." },
            { id: 14, topic: "Chest Pain & ACS", q: "Findings included ST elevation in leads II, III and aVF. The most likely location for the patient's MI is:", opts: ["A. Anterolateral", "B. Septal", "C. Inferior", "D. Posterior"], ans: 2, exp: "Elevations in leads II, III, and aVF correlate with inferior wall myocardial infarction." },
            { id: 15, topic: "Chest Pain & ACS", q: "An old female patient was at the grocery store when she experienced chest pain that radiated to her left arm. She also reported diaphoresis. An ECG showed ST elevation in leads II, III and aVF. Most likely location of her MI:", opts: ["A. Anterolateral", "B. Septal", "C. Inferior", "D. Posterior"], ans: 2, exp: "Classic inferior MI presentation often associated with diaphoresis and autonomic symptoms." },
            { id: 16, topic: "Chest Pain & ACS", q: "An ECG showed ST elevations in leads I, aVL, V3, V4, V5 and V6. Most likely location:", opts: ["A. Anterolateral", "B. Septal", "C. Inferior", "D. Posterior"], ans: 0, exp: "V3-V4 (Anterior) + I, aVL, V5-V6 (Lateral) combined define an Anterolateral MI." },
            { id: 17, topic: "Chest Pain & ACS", q: "A patient with diabetes, hypertension and hypercholesterolemia presented to the ER with chest pain that radiates to his left arm. His ECG showed T wave inversions in the lateral leads. Best next step:", opts: ["A. Call cardiology and arrange for immediate PCI", "B. Connect him to a cardiac monitor and administer aspirin and nitroglycerin"], ans: 1, exp: "T-wave inversions indicate ischemia (NSTEMI/Unstable Angina), not necessarily a STEMI requiring immediate primary PCI. Initial medical stabilization is key." },
            { id: 18, topic: "Chest Pain & ACS", q: "Management of a patient with STEMI. Choose the best next step:", opts: ["A. Transfer to a hospital with fibrinolysis capabilities only (no PCI), 15 minutes away", "B. Transfer to a hospital with PCI capabilities only, 15 minutes away"], ans: 1, exp: "PCI is always preferred over fibrinolysis if the facility can be reached within the 120-minute window. A 15-minute transfer easily meets this." },

            // --- BLS ---
            { id: 19, topic: "BLS", q: "After finding an unresponsive child, yelling for help, and confirming the child isn't breathing, what would be your next course of action?", opts: ["A. Leave the child and search for an AED", "B. Deliver rescue breaths", "C. Begin back blows and chest thrusts", "D. Deliver 30 chest compressions", "E. Start Heimlich maneuver"], ans: 3, exp: "In the C-A-B sequence, if there is no breathing (and presumed no pulse), you immediately begin high-quality chest compressions." },
            { id: 20, topic: "BLS", q: "While performing CPR on an infant, another rescuer appears on the scene. What do you do next?", opts: ["A. Immediately transport the patient", "B. Wait until exhausted, then switch", "C. Have the second rescuer help with CPR to minimize fatigue", "D. Have the second rescuer begin ventilations, ratio 30:2", "E. Ask the second rescuer to call for help"], ans: 2, exp: "A second rescuer should immediately integrate into the CPR effort to switch tasks, minimize fatigue, and change the compression:ventilation ratio to 15:2 for pediatrics." },
            { id: 21, topic: "BLS", q: "After finding someone unresponsive with a pulse but not breathing, and you are unable to give effective breaths, what do you do next?", opts: ["A. Begin CPR", "B. Repeat head tilt-chin lift and attempt the breath again", "C. Abdominal thrusts", "D. Heimlich maneuver", "E. Leave the child and search for an AED"], ans: 1, exp: "If the first breath does not go in, reposition the airway (head tilt-chin lift) before attempting a second breath." },
            { id: 22, topic: "BLS", q: "Change between rescuers should be:", opts: ["A. Every two cycles", "B. Every ten cycles", "C. Every five cycles", "D. Every three cycles"], ans: 2, exp: "Rescuers should swap compression roles approximately every 2 minutes, which corresponds to about 5 cycles of 30:2 CPR." },
            { id: 23, topic: "BLS", q: "Which of the following is wrong about CPR?", opts: ["A. Push 2 inches deep", "B. Minimize interruptions", "C. 30:2 ratio", "D. Allow for partial recoil", "E. One last thing that was clearly correct"], ans: 3, exp: "You must allow for FULL (not partial) chest recoil to allow the heart to properly refill with blood between compressions." },
            { id: 24, topic: "BLS", q: "The following procedure could be used in first aid management of snake bite EXCEPT:", opts: ["A. Removal of constricting items", "B. Light immobilization of injured part", "C. Application of tight constricting band above swelling", "D. Making small parallel incision through fang marks", "E. Resting the victim and reducing activity"], ans: 3, exp: "Making incisions or attempting to suck out venom is contraindicated as it increases tissue damage and infection risk without removing meaningful amounts of venom." },
            { id: 25, topic: "BLS", q: "After finding an unresponsive child, yelling for help, and confirming the child isn't breathing and HAS a pulse, what would be your next course of action?", opts: ["A. Leave the child and search for an AED", "B. Open airway by head tilt-chin lift and try to restore breathing", "C. Begin back blows and chest thrusts", "D. Start CPR", "E. Start Heimlich maneuver"], ans: 1, exp: "If a pulse is present but the patient is apneic, respiratory arrest is occurring. You should open the airway and provide rescue breaths (1 breath every 2-3 seconds for a child)." },
            { id: 26, topic: "BLS", q: "Arriving first to the scene, you find an unresponsive person with no pulse who has vomited and you are not comfortable giving breaths. What is the next best action?", opts: ["A. Wipe off the face or cover with a shirt", "B. Compression-only CPR", "C. Go and get help", "D. Do not initiate resuscitation", "E. One last choice that made no sense"], ans: 1, exp: "Hands-only (compression-only) CPR is highly effective and recommended for bystanders who are unwilling or unable to provide rescue breaths." },
            { id: 27, topic: "BLS", q: "In an unresponsive patient, you should check the carotid pulse for no more than:", opts: ["A. Five seconds", "B. Two seconds", "C. Ten seconds", "D. One second"], ans: 2, exp: "Pulse checks should take at least 5 seconds but NO MORE than 10 seconds to minimize interruptions in chest compressions." },
            { id: 28, topic: "BLS", q: "The chest compression to rescue breath ratio in a pediatric patient during CPR (two rescuers) is:", opts: ["A. 15:2", "B. 15:3", "C. 30:2", "D. 30:3"], ans: 0, exp: "For a single rescuer it is 30:2, but for two-rescuer pediatric CPR, the ratio switches to 15:2." },
            { id: 29, topic: "BLS", q: "When giving rescue breaths to an apneic patient with a pulse, when should you re-check the pulse?", opts: ["A. Every 10 seconds", "B. Every minute", "C. Every 2 minutes", "D. Every 5 minutes"], ans: 2, exp: "During rescue breathing, pulse should be re-assessed every 2 minutes to ensure the patient hasn't progressed to cardiac arrest." },
            { id: 30, topic: "BLS", q: "Best artery to assess pulse in an infant is:", opts: ["A. Femoral", "B. Brachial", "C. Carotid", "D. Radial"], ans: 1, exp: "The brachial artery (inside the upper arm) is easiest to access and palpate reliably in an infant's anatomy." },
            { id: 31, topic: "BLS", q: "Rate of chest compression in pediatrics with one rescuer is:", opts: ["A. 30:2", "B. 15:2"], ans: 0, exp: "One-rescuer CPR across all ages (except newborns) uses a 30:2 compression-to-ventilation ratio." },
            { id: 32, topic: "BLS", q: "Which of the following does not need prolonged resuscitation?", opts: ["A. Subarachnoid hemorrhage", "B. Hypothermia", "C. Electrical shock with alternating current", "D. Drug addict comatose"], ans: 0, exp: "Patients with severe hypothermia, drug toxicity, or electrical shock may have prolonged reversible causes. A massive SAH is typically an irreversible catastrophic brain injury." },
            { id: 33, topic: "BLS", q: "Choose the correct steps of basic life support (BLS):", opts: ["A. Assess the victim, activate EMS and bring AED, perform chest compressions, rescue breaths", "B. Assess the victim, perform chest compressions, rescue breathing, defibrillation", "C. Assess airway only"], ans: 0, exp: "The standard sequence is: Verify scene safety -> Check responsiveness -> Call EMS/Get AED -> Check breathing/pulse -> Start CPR (CAB)." },
            { id: 34, topic: "BLS", q: "Farmer presented with cyanosis, frothy mouth secretions, difficulty breathing, pinpoint pupils. The first thing you should do is:", opts: ["A. Clear airways", "B. Give atropine", "C. Give pralidoxime"], ans: 0, exp: "While Atropine is the antidote for this organophosphate poisoning, basic ABCs (clearing the airway of frothy secretions) ALWAYS come first." },
            { id: 35, topic: "BLS", q: "You feel uncomfortable to give CPR for an unresponsive person with no pulse:", opts: ["A. Start chest compressions", "B. Head tilt, jaw thrust then attempt to give breath"], ans: 0, exp: "If uncomfortable giving mouth-to-mouth, perform continuous 'Hands-Only' chest compressions." },
            { id: 36, topic: "BLS", q: "Best order for CPR is:", opts: ["A. Assess responsiveness → Call EMS & get AED → Check breathing & pulse → Start chest compressions"], ans: 0, exp: "This outlines the exact modern AHA BLS algorithm sequence." },

            // --- ARRHYTHMIAS ---
            { id: 50, topic: "Arrhythmias", q: "Nurse was connecting a patient to a monitor to keep track of his vitals when the patient suddenly became unresponsive. His ECG showed ventricular fibrillation. The most appropriate next step in management is:", opts: ["A. Wait a few minutes to see if the patient wakes up on his own", "B. Synchronized DC shock", "C. Defibrillation (200 j)", "D. Epinephrine", "E. Amiodarone"], ans: 2, exp: "Immediate unsynchronized defibrillation (typically 200J biphasic) is the standard of care for V-Fib." },
            { id: 51, topic: "Arrhythmias", q: "ECG showing first degree heart block in an asymptomatic 29 year old male, best next step?", opts: ["A. No acute treatment", "B. Synchronized cardioversion 50 J", "C. Synchronized cardioversion 200 J", "D. Defibrillation", "E. Admit for percutaneous pacing"], ans: 0, exp: "Asymptomatic first-degree AV block is benign and does not require intervention." },
            { id: 52, topic: "Arrhythmias", q: "ECG showing atrial fibrillation, patient has palpitations for 1 week, stable. Best next step?", opts: ["A. Synchronized cardioversion 50 J", "B. Synchronized cardioversion 200 J", "C. Defibrillation", "D. Amiodarone", "E. IV diltiazem"], ans: 4, exp: "In stable Afib, rate control (Diltiazem/Metoprolol) is the first priority over rhythm control." },
            { id: 53, topic: "Arrhythmias", q: "Progressive prolongation of PR intervals with dropped QRS is seen in:", opts: ["A. Complete heart block", "B. First degree", "C. Second degree Mobitz 1", "D. Second degree Mobitz 2"], ans: 2, exp: "This is the exact definition of Mobitz Type I (Wenckebach) AV block." },
            { id: 54, topic: "Arrhythmias", q: "Patient became unresponsive and ECG shows ventricular fibrillation. What do you do next?", opts: ["A. Cardioversion", "B. Defibrillation", "C. Amiodarone", "D. Adenosine", "E. Beta blocker"], ans: 1, exp: "Always immediately defibrillate pulseless V-Tach and V-Fib." },
            { id: 55, topic: "Arrhythmias", q: "Patient became unresponsive his ECG is V. Fib. what do you do next?", opts: ["A. Cardioversion", "B. Defibrillation", "C. Amiodarone", "D. Adenosine", "E. B-Blocker"], ans: 1, exp: "Defibrillation resets the heart's electrical activity allowing the SA node to take over." },
            { id: 56, topic: "Arrhythmias", q: "Bradycardia with poor perfusion, What are the steps of management?", opts: ["A. Chest compressions, cardiac drugs, defibrillation", "B. Chest compression, transcutaneous pacing, basic airway", "C. Chest compression, invasive airway, transcutaneous pacing", "D. Chest compression, defibrillation, cardiac drugs"], ans: 1, exp: "Unstable bradycardia requires immediate pacing (TCP), and if profound (cardiac arrest imminent), compressions." },
            { id: 57, topic: "Arrhythmias", q: "A teenager collapsed playing football. The ECG rhythm shown is consistent with Torsade de Pointes. This is:", opts: ["A. SVT", "B. Atrial fibrillation", "C. Wolff-Parkinson-White syndrome", "D. Polymorphic Ventricular Tachycardia"], ans: 3, exp: "Polymorphic ventricular tachycardia characterized by shifting amplitude (twisting of the points) is Torsade de Pointes." },
            { id: 58, topic: "Arrhythmias", q: "What's the first thing to check in bradycardia algorithm?", opts: ["A. Perfusion", "B. BP", "C. HR", "D. Rhythm"], ans: 0, exp: "The ACLS bradycardia algorithm branches immediately based on whether the patient has adequate or poor perfusion (stable vs unstable)." },
            { id: 59, topic: "Arrhythmias", q: "The most appropriate management for pulseless electrical activity (PEA):", opts: ["A. Amiodarone", "B. Epinephrine", "C. Beta blocker", "D. Atropine"], ans: 1, exp: "PEA is an unshockable arrest rhythm; treatment is high-quality CPR and Epinephrine 1mg every 3-5 minutes." },
            { id: 60, topic: "Arrhythmias", q: "Unresponsive patient with V-fib received a shock and rhythm converted into third degree AV block. Next step?", opts: ["A. Epinephrine or Transcutaneous pacing", "B. Defibrillation", "C. Amiodarone", "D. Atropine"], ans: 0, exp: "Post-arrest profound bradycardia/heart block is managed with pacing and chronotropes (Epinephrine/Dopamine infusions)." },
            { id: 61, topic: "Arrhythmias", q: "Palpitations, stable, HR 130. ECG shows Atrial flutter. Best next step:", opts: ["A. Adenosine", "B. Synchronized DC shock", "C. Beta blocker"], ans: 2, exp: "Stable atrial flutter is managed similarly to Afib: rate control with Beta-blockers or Calcium channel blockers." },
            { id: 62, topic: "Arrhythmias", q: "Progressive prolongation of PR interval is seen in:", opts: ["A. Mobitz type 1 heart block"], ans: 0, exp: "Wenckebach (Mobitz I) shows progressive lengthening until a beat is dropped." },
            { id: 63, topic: "Arrhythmias", q: "First line medication to treat symptomatic bradycardia is:", opts: ["A. Atropine", "B. Diltiazem", "C. Propranolol"], ans: 0, exp: "Atropine 1mg IV is the first-line drug in the ACLS protocol for symptomatic bradycardia." },
            { id: 64, topic: "Arrhythmias", q: "ECG of Mobitz type II heart block in a stable patient, management is:", opts: ["A. Atropine", "B. Admission and permanent pacing"], ans: 1, exp: "Mobitz II block has a high risk of sudden progression to complete block, so a permanent pacemaker is indicated." },
            { id: 65, topic: "Arrhythmias", q: "Palpitations in asthmatic patient and ECG shows Afib, First line treatment?", opts: ["A. Diltiazem"], ans: 0, exp: "Beta-blockers are avoided in asthmatics due to bronchospasm risk; Non-DHP Calcium channel blockers (Diltiazem) are preferred." },
            { id: 66, topic: "Arrhythmias", q: "Management of Bradycardia with poor perfusion:", opts: ["A. Prepare for trans venous pacing and give atropine and IV adrenaline while preparing."], ans: 0, exp: "Unstable bradycardia requires pacing; medications are bridges until the pacer is secured." },
            { id: 67, topic: "Arrhythmias", q: "Best treatment to survive V.fib is:", opts: ["A. Defibrillation"], ans: 0, exp: "Rapid electrical defibrillation is the single most important intervention for V-Fib survival." },
            { id: 68, topic: "Arrhythmias", q: "Patient with apnea and loss of consciousness, ECG shown of V-fib, sequence of management:", opts: ["A. Chest compression, defibrillation, invasive airway."], ans: 0, exp: "Start compressions immediately, shock as soon as ready, and secure airway once ROSC or during advanced resuscitation." },
            { id: 69, topic: "Arrhythmias", q: "A question about the management of Asystole:", opts: ["A. Administer Epinephrine"], ans: 0, exp: "Asystole is unshockable; it requires high-quality CPR and Epinephrine." },
            { id: 70, topic: "Arrhythmias", q: "Case with patient who has family history of his father's early death due to cardiac disease. The ECG pattern you might expect is:", opts: ["A. Torsade de pointes"], ans: 0, exp: "Family history of sudden cardiac death often points to congenital Long QT syndrome, leading to Torsades." },
            { id: 71, topic: "Arrhythmias", q: "Most important risk factor for pulmonary embolism is:", opts: ["A. Deep vein thrombosis"], ans: 0, exp: "Most pulmonary emboli originate as thrombi in the deep veins of the lower extremities." },
            { id: 72, topic: "Arrhythmias", q: "Patient with palpitations and has pulse, no loss of consciousness or chest pain, ECG shows V-Tach. First step in management:", opts: ["A. Amiodarone"], ans: 0, exp: "Stable VT is treated with antiarrhythmic infusions, primarily Amiodarone." },
            { id: 73, topic: "Arrhythmias", q: "Unresponsive patient who developed shockable rhythm, best treatment?", opts: ["A. Defibrillation"], ans: 0, exp: "Shockable rhythms (VF, pVT) mandate immediate defibrillation." },
            { id: 74, topic: "Arrhythmias", q: "ECG showing Mobitz type II heart block, initial ER management might include:", opts: ["A. Transcutaneous pacing pads placed in readiness"], ans: 0, exp: "If requiring acute stabilization in the ER, transcutaneous pacing pads are applied preemptively." },
            { id: 75, topic: "Arrhythmias", q: "Unstable ventricular fibrillation treated with defibrillation, then patient developed third degree heart block. Next step is:", opts: ["A. Transcutaneous pacing"], ans: 0, exp: "Post-shock complete heart block with poor perfusion requires mechanical pacing." },
            { id: 76, topic: "Arrhythmias", q: "Patient with apnea and loss of consciousness, ECG shows ventricular fibrillation. Next immediate action is:", opts: ["A. Defibrillation"], ans: 0, exp: "Do not delay shock if a defibrillator is immediately available for VF." },

            // --- STROKE ---
            { id: 77, topic: "Stroke", q: "Left hand weakness, pronator drift, no sensory loss. Location of lesion is:", opts: ["A. Right frontal lobe", "B. Left cerebellum", "C. Right cerebellum", "D. Right parietal lobe", "E. Left parietal lobe"], ans: 0, exp: "Motor deficits without sensory loss localize to the primary motor cortex in the contralateral frontal lobe." },
            { id: 78, topic: "Stroke", q: "A stroke patient presented with intention tremor, dysdiadochokinesia, nystagmus, ataxia, and contralateral motor deficit. Which artery is affected?", opts: ["A. Anterior cerebral artery", "B. Middle cerebral artery", "C. Posterior cerebral artery", "D. Vertebrobasilar artery", "E. External carotid artery"], ans: 3, exp: "These are classic cerebellar and brainstem signs, territories supplied by the vertebrobasilar system." },
            { id: 79, topic: "Stroke", q: "Which of the following arteries is NOT part of the circle of Willis?", opts: ["A. Vertebral artery", "B. Basilar artery", "C. Anterior communicating artery", "D. Posterior communicating artery", "E. Internal carotid artery"], ans: 0, exp: "The vertebral arteries join to form the basilar, which feeds into the circle, but the vertebrals themselves are technically below/outside the direct ring of the Circle of Willis." },
            { id: 80, topic: "Stroke", q: "Patient presented with left arm weakness, pronator drift, power 2/5, intact sensation and speech. Where is the lesion?", opts: ["A. Right cerebellum", "B. Right parietal lobe", "C. Right frontal lobe", "D. Left cerebellum", "E. Left parietal lobe"], ans: 2, exp: "Isolated contralateral motor weakness points to the motor strip in the Right Frontal Lobe." },
            { id: 81, topic: "Stroke", q: "A patient with history of diabetes and hypertension presented with vertigo, double vision, and difficulty speaking. Symptoms resolved within 1-2 hours. Most likely diagnosis?", opts: ["A. Embolic stroke - Middle cerebral artery", "B. Thrombotic stroke - Middle cerebral artery", "C. TIA - Vertebrobasilar artery", "D. TIA - Middle cerebral artery", "E. Thrombotic stroke - Anterior cerebral artery"], ans: 2, exp: "Transient symptoms (<24h) indicate a Transient Ischemic Attack (TIA). Brainstem symptoms (diplopia, vertigo) point to posterior/vertebrobasilar circulation." },
            { id: 82, topic: "Stroke", q: "Diseases that must be reported immediately to health authorities include all EXCEPT:", opts: ["A. Cholera", "B. Plague", "C. Poliomyelitis", "D. Yellow fever", "E. Meningitis"], ans: 4, exp: "While bacterial meningitis is reportable, things like Cholera, Plague, Polio, and Yellow fever trigger distinct immediate international/high-tier epidemiological alerts." },
            { id: 83, topic: "Stroke", q: "Lady presents with headache. Correct match is:", opts: ["A. Band-like - Cluster", "B. Tenderness with touch - Tension", "C. Neck stiffness - Subarachnoid hemorrhage", "D. Early morning - Migraine", "E. Need more neurologic symptoms"], ans: 2, exp: "Meningeal irritation from blood in the subarachnoid space causes intense nuchal rigidity (neck stiffness)." },
            { id: 84, topic: "Stroke", q: "All of the following are contraindications to thrombolysis therapy EXCEPT:", opts: ["A. Weakness noticed 5 hours ago", "B. INR > 1.7", "C. Platelets <150", "D. Active bleeding"], ans: 2, exp: "Normal platelets are 150-450k. The absolute contraindication threshold for tPA is usually Platelets < 100,000. So <150 isn't strictly an absolute contraindication unless below 100." },
            { id: 85, topic: "Stroke", q: "All of the following are contraindications to thrombolysis therapy EXCEPT:", opts: ["A. Brain tumor", "B. BP >180/110", "C. Previous stroke", "D. Two other contraindications"], ans: 3, exp: "Brain tumors, extreme hypertension, and recent strokes are all high-risk contraindications for systemic tPA." },
            { id: 86, topic: "Stroke", q: "A contraindication for tissue plasminogen activator (tPA) therapy is:", opts: ["A. BP 200/110", "B. Symptoms of ischemia", "C. Limb weakness for 2 hours", "D. No findings on CT"], ans: 0, exp: "Blood pressure >185/110 is a contraindication to tPA due to a massively increased risk of hemorrhagic transformation." },
            { id: 87, topic: "Stroke", q: "One of the following is NOT a candidate for (tPA):", opts: ["A. Platelets 250", "B. BP 210/110", "C. Symptoms of ischemia for 30 minutes"], ans: 1, exp: "Again, severe hypertension (BP > 185/110) disqualifies a patient from tPA until BP is safely lowered." },
            { id: 88, topic: "Stroke", q: "Severe sudden headache with photophobia, vomiting, neck stiffness, BP 190/110 First-line treatment is:", opts: ["A. Nicardipine"], ans: 0, exp: "This is a Subarachnoid Hemorrhage. Nicardipine (calcium channel blocker) is excellent for tight BP control to prevent re-bleeding." },
            { id: 89, topic: "Stroke", q: "Patient with Ehlers-Danlos syndrome presents with headache, neck stiffness, photophobia, and nausea. Most appropriate medication:", opts: ["A. Nicardipine"], ans: 0, exp: "Ehlers-Danlos increases the risk of berry aneurysms and SAH. Blood pressure must be aggressively controlled with agents like Nicardipine." },
            { id: 90, topic: "Stroke", q: "Ninety-year-old patient with dysarthria only and unknown medical history. Next best step:", opts: ["A. Glucocheck"], ans: 0, exp: "Hypoglycemia is a well-known stroke mimic and must be rapidly ruled out with a bedside glucose check." },

            // --- PRIMARY SURVEY FOR TRAUMA ---
            { id: 91, topic: "Primary Survey for Trauma", q: "Which of the following is NOT of the adjuncts of the primary survey?", opts: ["A. ABG", "B. Urine output", "C. DPL", "D. FAST", "E. C-spine X-ray / Chest X-ray / Pelvic X-ray"], ans: 4, exp: "According to the key, all are adjuncts, meaning none of the specific items are truly 'NOT'. The 'E' option encompasses the core radiologic adjuncts." },
            { id: 92, topic: "Primary Survey for Trauma", q: "All of the following are pitfalls when examining the musculoskeletal system EXCEPT:", opts: ["A. Blood loss", "B. Altered sensorium", "C. Injury in ligaments and soft tissues", "D. Compartment syndrome", "E. Fractures"], ans: 1, exp: "Altered sensorium is a neurologic pitfall (disguising pain), but not an intrinsic musculoskeletal physical exam pitfall itself." },
            { id: 93, topic: "Primary Survey for Trauma", q: "As a doctor who first receives a patient in the ER, the most important task you should do is:", opts: ["A. Write specific details about the injury", "B. Inform the police", "C. Indicate whether your report is primary or final", "D. Take full history", "E. Add the estimated duration of incapacity"], ans: 3, exp: "While primary ABCDE comes first, from these medicolegal/clerical options, taking a robust history ensures you understand mechanism and co-morbidities." },
            { id: 94, topic: "Primary Survey for Trauma", q: "Not included in the primary survey of trauma patients:", opts: ["A. Pelvic X-ray", "B. Chest X-ray", "C. Nasogastric tube", "D. Brain CT", "E. Oxygen"], ans: 3, exp: "A Brain CT requires transferring the patient out of the trauma bay; it is part of the secondary survey, not the primary resuscitation phase." },
            { id: 95, topic: "Primary Survey for Trauma", q: "A 23-year-old male involved in a massive RTA with GCS 7 requires a definitive airway. Which of the following is NOT considered a definitive airway device?", opts: ["A. Tracheostomy tube", "B. Surgical cricothyroidotomy tube", "C. Nasotracheal tube", "D. Orotracheal tube", "E. Laryngeal mask airway"], ans: 4, exp: "A definitive airway implies a tube with a balloon inflated below the vocal cords. The LMA sits above the glottis and does not protect against aspiration." },
            { id: 96, topic: "Primary Survey for Trauma", q: "In the initial assessment of trauma patients, which of the following DOES NOT affect ventilation?", opts: ["A. Cardiac tamponade", "B. Flail chest and pulmonary contusion", "C. Airway obstruction", "D. Hemothorax", "E. Tension pneumothorax"], ans: 0, exp: "Cardiac tamponade restricts cardiac filling (a 'Circulation' issue), whereas the others directly impair lung expansion/gas exchange ('Ventilation')." },
            { id: 97, topic: "Primary Survey for Trauma", q: "Patient brought to ER after falling from 5 stories, HR 110, BP 70/50, anxious. What degree of hypovolemic shock is this?", opts: ["A. I", "B. II", "C. III", "D. IV", "E. Irreversible"], ans: 2, exp: "Class III shock features hypotension (decompensation), tachycardia, and anxiety/confusion, representing 30-40% blood loss." },
            { id: 98, topic: "Primary Survey for Trauma", q: "In the initial assessment of trauma patients, which of the following DOES NOT affect circulation?", opts: ["A. Femoral fracture", "B. Spinal cord injury", "C. Brain trauma", "D. Second-degree burn of 20% BSA", "E. Ruptured heart valve"], ans: 2, exp: "Isolated brain trauma rarely causes hypotension/circulatory shock (Cushing's reflex actually causes hypertension). Always look for another source of bleeding." },
            { id: 99, topic: "Primary Survey for Trauma", q: "A story about an unconscious patient arriving comatose to the ER after a quarrel. CT showed frontal bone fracture and bilateral subarachnoid hemorrhage. What can you say to the police?", opts: ["A. He was not in a quarrel", "B. He was hit with a large stone", "C. He was hit with a stick", "D. He fell on the ground", "E. He collided with a blunt object"], ans: 4, exp: "As a physician, you describe objective mechanistic findings (blunt trauma) rather than assuming specific weapons or the social context." },
            { id: 100, topic: "Primary Survey for Trauma", q: "You are assessing a patient's Glasgow Coma Scale. Eyes open to voice, inappropriate words, localizes pain. What is the GCS?", opts: ["A. E3 V4 M5", "B. E2 V4 M2", "C. E3 V3 M5", "D. E3 V3 M4", "E. E3 V3 M3"], ans: 2, exp: "Eyes to voice = 3, Inappropriate words = 3, Localizes to pain = 5. Total GCS = 11." },
            { id: 101, topic: "Primary Survey for Trauma", q: "Which of the following about management in ER is false:", opts: ["A. You should know the specific injury before initiating management", "B. Priorities are the same for all patients"], ans: 0, exp: "In ATLS, you treat the greatest threat to life first (ABCDEs) without needing a specific anatomical diagnosis immediately." },
            { id: 102, topic: "Primary Survey for Trauma", q: "Which of the following is wrong regarding trauma patients with comorbidity?", opts: ["A. Trauma patient with comorbidity should not be transferred to higher facility", "B. Trauma patient with comorbidity should be transferred to higher facility"], ans: 0, exp: "Co-morbidities drastically lower physiologic reserve; these patients often require early transfer to tertiary trauma centers." },
            { id: 103, topic: "Primary Survey for Trauma", q: "Best investigation for hemoperitoneum in trauma is:", opts: ["A. FAST"], ans: 0, exp: "Focused Assessment with Sonography for Trauma (FAST) is the gold standard, rapid bedside test for intra-abdominal blood." },
            { id: 104, topic: "Primary Survey for Trauma", q: "Stages of shock is 3 or 4 or 9?", opts: ["A. 3 (Pre-shock, shock, end-organ dysfunction)"], ans: 0, exp: "Pathophysiologically, shock evolves through compensated (pre-shock), decompensated (shock), and irreversible (end-organ dysfunction) phases." },
            { id: 105, topic: "Primary Survey for Trauma", q: "Not included in primary survey is:", opts: ["A. Taking full history"], ans: 0, exp: "Primary survey focuses purely on identifying and treating immediate life threats (ABCDE). Full history belongs to the secondary survey." },
            { id: 106, topic: "Primary Survey for Trauma", q: "Which of the following is NOT included in 'E' of ABCDE?", opts: ["A. Anything other than exposure & environmental control"], ans: 0, exp: "'E' stands strictly for Exposure (completely undressing the patient) and Environmental control (preventing hypothermia)." },
            { id: 107, topic: "Primary Survey for Trauma", q: "Which of the following is NOT an indication for intubation?", opts: ["A. GCS of 10"], ans: 0, exp: "The general ATLS rule is 'GCS 8, Intubate'. A GCS of 10 does not automatically mandate intubation unless the airway is otherwise unprotected." },
            { id: 108, topic: "Primary Survey for Trauma", q: "Which of the following is NOT an objective sign of airway obstruction?", opts: ["A. Neck vein distention"], ans: 0, exp: "Neck vein distention indicates elevated right heart pressures (Tension pneumothorax, Tamponade), which are circulatory/thoracic issues, not an airway obstruction." },
            { id: 109, topic: "Primary Survey for Trauma", q: "Which of the following statements about ER trauma management is correct?", opts: ["A. Priorities are the same for all trauma patients"], ans: 0, exp: "The ATLS protocol (Airway, Breathing, Circulation, etc.) is applied systematically to every single trauma patient regardless of injury." },
            { id: 110, topic: "Primary Survey for Trauma", q: "Flail chest management includes:", opts: ["A. 100% Oxygen"], ans: 0, exp: "Flail chest disrupts ventilation and causes underlying pulmonary contusion; supplemental 100% oxygen and adequate analgesia are critical first steps." }
        ];

        // State Management
        let state = {
            mode: 'home', // 'home', 'quiz', 'review'
            activeQuestions: [],
            currentIndex: 0,
            answers: {}, 
            wrongAnswers: new Set()
        };

        const appContainer = document.getElementById('app');
        const uniqueTopics = [...new Set(quizData.map(q => q.topic))];

        // Core Functions
        function setState(newState) {
            state = { ...state, ...newState };
            render();
        }

        window.startQuiz = function(topic, random = false) {
            let filtered = topic === 'All' ? [...quizData] : quizData.filter(q => q.topic === topic);
            if (random) {
                filtered = filtered.sort(() => Math.random() - 0.5);
            }
            setState({
                activeQuestions: filtered,
                currentIndex: 0,
                answers: {},
                wrongAnswers: new Set(),
                mode: 'quiz'
            });
        };

        window.startReview = function() {
            if (state.wrongAnswers.size === 0) return;
            const wrongQs = quizData.filter(q => state.wrongAnswers.has(q.id));
            setState({
                activeQuestions: wrongQs,
                currentIndex: 0,
                answers: {},
                mode: 'review'
            });
        };

        window.selectAnswer = function(qId, optIdx, correctIdx) {
            if (state.answers[qId] !== undefined) return; 

            const newAnswers = { ...state.answers, [qId]: optIdx };
            const newWrongAnswers = new Set(state.wrongAnswers);

            if (optIdx !== correctIdx) {
                newWrongAnswers.add(qId);
            } else if (state.mode === 'review') {
                newWrongAnswers.delete(qId);
            }

            setState({ answers: newAnswers, wrongAnswers: newWrongAnswers });
        };

        window.goNext = function() {
            if (state.currentIndex < state.activeQuestions.length - 1) {
                setState({ currentIndex: state.currentIndex + 1 });
            }
        };

        window.goPrev = function() {
            if (state.currentIndex > 0) {
                setState({ currentIndex: state.currentIndex - 1 });
            }
        };

        window.goHome = function() {
            setState({ mode: 'home' });
        };

        // Render Logic
        function render() {
            if (state.mode === 'home') {
                renderHome();
            } else {
                renderQuiz();
            }
        }

        function renderHome() {
            let topicButtons = uniqueTopics.map(topic => {
                const count = quizData.filter(q => q.topic === topic).length;
                return `
                    <button onclick="window.startQuiz('${topic}')" class="flex flex-col items-start p-5 rounded-xl border border-slate-200 hover:border-blue-500 hover:shadow-md transition-all bg-slate-50 hover:bg-white text-left group">
                        <span class="font-semibold text-slate-800 group-hover:text-blue-600">${topic}</span>
                        <span class="text-sm text-slate-500 mt-1">${count} Questions</span>
                    </button>
                `;
            }).join('');

            const reviewDisabled = state.wrongAnswers.size === 0;
            const reviewClasses = reviewDisabled 
                ? 'bg-slate-100 text-slate-400 cursor-not-allowed'
                : 'bg-amber-100 text-amber-800 hover:bg-amber-200 border border-amber-200';

            appContainer.innerHTML = `
                <div class="max-w-4xl mx-auto px-6 py-12 fade-in">
                    <header class="mb-10 text-center">
                        <div class="inline-flex items-center justify-center p-4 bg-blue-100 rounded-full mb-4">
                            <i class="fa-solid fa-heart-pulse text-3xl text-blue-600"></i>
                        </div>
                        <h1 class="text-4xl font-extrabold text-slate-900 mb-2 tracking-tight">Emergency Medicine</h1>
                        <p class="text-lg text-slate-500 font-medium">Final Past Papers Quiz Bank</p>
                    </header>

                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                        <div class="p-6 md:p-8">
                            <h2 class="text-xl font-bold mb-6 flex items-center">
                                <i class="fa-solid fa-stethoscope text-xl mr-2 text-indigo-500"></i> Choose a Topic
                            </h2>
                            
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                ${topicButtons}
                            </div>

                            <div class="mt-8 pt-8 border-t border-slate-100 grid grid-cols-1 md:grid-cols-2 gap-4">
                                <button onclick="window.startQuiz('All', true)" class="flex items-center justify-center p-4 rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-semibold transition-colors shadow-sm">
                                    <i class="fa-solid fa-shuffle mr-2"></i> Start Random Mix (All)
                                </button>
                                
                                <button onclick="window.startReview()" ${reviewDisabled ? 'disabled' : ''} class="flex items-center justify-center p-4 rounded-xl font-semibold transition-colors shadow-sm ${reviewClasses}">
                                    <i class="fa-solid fa-triangle-exclamation mr-2"></i> Review Incorrect (${state.wrongAnswers.size})
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderQuiz() {
            const question = state.activeQuestions[state.currentIndex];
            if (!question) return;

            const isAnswered = state.answers[question.id] !== undefined;
            const selectedIdx = state.answers[question.id];
            const isCorrect = selectedIdx === question.ans;

            let optionsHtml = question.opts.map((opt, idx) => {
                let btnClass = "w-full text-left p-4 rounded-xl border-2 transition-all duration-200 ease-in-out relative flex items-center overflow-hidden ";
                let iconHtml = '';

                if (!isAnswered) {
                    btnClass += "border-slate-200 hover:border-blue-400 hover:bg-blue-50 text-slate-700";
                } else {
                    if (idx === question.ans) {
                        btnClass += "border-emerald-500 bg-emerald-50 text-emerald-900 font-medium";
                        iconHtml = '<i class="fa-solid fa-circle-check text-2xl text-emerald-500 absolute right-4"></i>';
                    } else if (idx === selectedIdx) {
                        btnClass += "border-red-400 bg-red-50 text-red-900";
                        iconHtml = '<i class="fa-solid fa-circle-xmark text-2xl text-red-500 absolute right-4"></i>';
                    } else {
                        btnClass += "border-slate-100 bg-white text-slate-400 opacity-60";
                    }
                }

                return `
                    <button ${isAnswered ? 'disabled' : ''} onclick="window.selectAnswer(${question.id}, ${idx}, ${question.ans})" class="${btnClass}">
                        <span class="pr-10">${opt}</span>
                        ${iconHtml}
                    </button>
                `;
            }).join('');

            let explanationHtml = '';
            if (isAnswered) {
                const bgClass = isCorrect ? 'bg-emerald-50/50 border-emerald-100' : 'bg-red-50/50 border-red-100';
                const iconClass = isCorrect ? 'bg-emerald-100 text-emerald-600' : 'bg-red-100 text-red-600';
                const titleClass = isCorrect ? 'text-emerald-800' : 'text-red-800';
                const titleText = isCorrect ? 'Correct!' : 'Incorrect';

                explanationHtml = `
                    <div class="p-6 border-t fade-in ${bgClass}">
                        <div class="flex items-start">
                            <div class="p-2 rounded-full mr-4 shrink-0 flex items-center justify-center ${iconClass}">
                                <i class="fa-solid fa-circle-info"></i>
                            </div>
                            <div>
                                <h4 class="font-bold mb-1 ${titleClass}">${titleText}</h4>
                                <p class="text-slate-700 leading-relaxed">${question.exp}</p>
                            </div>
                        </div>
                    </div>
                `;
            }

            const headerTitle = state.mode === 'review' ? 'Review Mode' : question.topic;
            const progressText = `${state.currentIndex + 1} / ${state.activeQuestions.length}`;
            
            const prevDisabled = state.currentIndex === 0;
            const nextDisabled = state.currentIndex === state.activeQuestions.length - 1;
            const isLastAndAnswered = nextDisabled && isAnswered;

            let nextButtonHtml = '';
            if (isLastAndAnswered) {
                nextButtonHtml = `
                    <button onclick="window.goHome()" class="flex items-center px-6 py-3 rounded-xl font-semibold text-white bg-blue-600 hover:bg-blue-700 transition shadow-sm">
                        Finish Quiz <i class="fa-solid fa-circle-check ml-2"></i>
                    </button>
                `;
            } else {
                nextButtonHtml = `
                    <button onclick="window.goNext()" ${nextDisabled ? 'disabled' : ''} class="flex items-center px-5 py-3 rounded-xl font-medium text-white bg-slate-800 border border-slate-800 hover:bg-slate-700 disabled:opacity-50 disabled:cursor-not-allowed transition shadow-sm">
                        Next <i class="fa-solid fa-chevron-right ml-2 text-sm"></i>
                    </button>
                `;
            }

            appContainer.innerHTML = `
                <div class="flex flex-col min-h-screen">
                    <header class="bg-white border-b border-slate-200 sticky top-0 z-10">
                        <div class="max-w-3xl mx-auto px-4 h-16 flex items-center justify-between">
                            <button onclick="window.goHome()" class="p-2 text-slate-500 hover:text-blue-600 hover:bg-slate-100 rounded-lg transition">
                                <i class="fa-solid fa-house text-lg"></i>
                            </button>
                            <div class="font-semibold text-slate-700">${headerTitle}</div>
                            <div class="text-sm font-medium text-slate-500 bg-slate-100 px-3 py-1 rounded-full">
                                ${progressText}
                            </div>
                        </div>
                    </header>

                    <main class="flex-grow flex flex-col justify-center items-center p-4">
                        <div class="w-full max-w-3xl fade-in">
                            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden mb-6">
                                <div class="p-6 md:p-8">
                                    <h2 class="text-xl md:text-2xl font-medium leading-relaxed text-slate-800 mb-8">
                                        ${question.q}
                                    </h2>
                                    <div class="space-y-3">
                                        ${optionsHtml}
                                    </div>
                                </div>
                                ${explanationHtml}
                            </div>

                            <div class="flex justify-between items-center mb-10">
                                <button onclick="window.goPrev()" ${prevDisabled ? 'disabled' : ''} class="flex items-center px-5 py-3 rounded-xl font-medium text-slate-600 bg-white border border-slate-200 hover:bg-slate-50 disabled:opacity-50 disabled:cursor-not-allowed transition shadow-sm">
                                    <i class="fa-solid fa-chevron-left mr-2 text-sm"></i> Previous
                                </button>
                                ${nextButtonHtml}
                            </div>
                        </div>
                    </main>
                </div>
            `;
        }

        // Initialize App
        render();

    </script>
</body>
</html>
