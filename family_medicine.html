            ],
            "Doctor-Patient Relationship": [
                ["Patient insists on being examined by one doctor because the doctor reminds him of his father. This is:", ["Informed consent", "Counter transference", "Transference", "Confidentiality", "Resistance"], 2, "Transference occurs when a patient unconsciously redirects feelings about a past figure (father) onto the physician."],
                ["After you listen to her worries your approach will be:", ["Ask more about her worries, feeling, ideas and concerns then share with her the options of the management"], 0, "Exploring ICE (Ideas, Concerns, Expectations) followed by shared decision-making is the gold standard approach."],
                ["What does the patient needs from Patient-Dr relationship?", ["Listening", "Competence", "Sympathy vs empathy", "Telling truth", "All the above"], 4, "Patients require a holistic combination of clinical competence, active listening, empathy, and honesty."],
                ["What do patients need the most from doctors?", ["Listening"], 0, "While competence is expected, studies consistently show patients value a doctor who truly 'listens' above all interpersonal traits."],
                ["Dr-Pt. relationship should be:", ["Human relationship", "Show empathy", "Warm nonverbal communication", "All of the above"], 3, "A therapeutic relationship relies on humanity, empathy, and positive non-verbal cues."],
                ["Doctor told next patient is drug abuser, got angry and shouted all abusers never want to get better. This is:", ["Transference", "Counter transference", "Projection"], 1, "Counter-transference is the physician's emotional reaction and bias projected onto the patient."],
                ["Pediatrician friend asks about your patient (her neighbor) who was diagnosed with HIV. What do you tell?", ["It is inappropriate to discuss pt information with you"], 0, "Confidentiality is absolute. You cannot disclose medical info to a colleague just because they are friends or neighbors."],
                ["A question about a case of transference asking about the wrong action:", ["Confront the patient about his feelings"], 0, "Aggressively confronting unconscious transference breaks rapport; it should be managed gently with boundaries."],
                ["Patients usually seek which of the following in any patient-doctor relationship:", ["Addressing their expectations"], 0, "Addressing a patient's specific expectations is crucial for satisfaction and adherence."],
                ["Pt-dr communication wrong?", ["Always keep eye contact with pt"], 0, "Staring continuously can be intimidating or culturally inappropriate; eye contact should be natural and broken occasionally."],
                ["Woman with crampy abdominal pain, increase with stress and relieved with defecation?", ["Therapeutic doctor patient relationship"], 0, "This is classic Irritable Bowel Syndrome (IBS). A strong therapeutic relationship is the cornerstone of managing functional disorders."],
                ["Dependance?", ["Is a consequence of dr/pt long-term relationship"], 0, "Over time, patients may become overly reliant on a specific GP for all decisions, leading to medical dependence."],
                ["Good doctor pt relation, what's not benefit for the dr?", ["More follow up visits"], 0, "While compliance improves, unnecessary frequent follow-ups take up clinical time and represent dependency, not a benefit."],
                ["Wrong about dr-pt relationship?", ["Patients have the same attitude"], 0, "Every patient has a unique background, personality, and attitude requiring a tailored approach."],
                ["A friend wanted antidepressants without documentation:", ["I know it's hard on you but I dont think its best for a friend to do that"], 0, "Politely but firmly refusing to prescribe outside of a formal, documented physician-patient relationship is legally and ethically required."]
            ]
        };

        // State Management
        let state = {
            view: 'home',
            currentTopic: null,
            questions: [],
            currentIndex: 0,
            answers: {}, 
            wrongQuestions: new Set()
        };

        const appEl = document.getElementById('app');

        // Initialize App
        function render() {
            if (state.view === 'home') {
                appEl.innerHTML = renderHome();
            } else if (state.view === 'quiz') {
                appEl.innerHTML = renderQuiz();
            }
        }

        function renderHome() {
            let topicsHtml = '';
            for (const [topic, qList] of Object.entries(quizData)) {
                topicsHtml += `
                    <button onclick="startQuiz('${topic}')" class="bg-white border border-slate-200 hover:border-indigo-400 hover:shadow-md transition-all rounded-2xl p-5 text-left group">
                        <h3 class="font-bold text-slate-800 text-lg group-hover:text-indigo-600 transition-colors">${topic}</h3>
                        <p class="text-slate-500 text-sm mt-1">${qList.length} Questions</p>
                    </button>
                `;
            }

            return `
                <div class="fade-in">
                    <div class="mb-8 text-center">
                        <h2 class="text-3xl font-extrabold text-slate-800 mb-3">Select a Topic</h2>
                        <p class="text-slate-500">Test your knowledge for the Family Medicine final.</p>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-8">
                        ${topicsHtml}
                    </div>

                    <div class="flex flex-col sm:flex-row gap-4 justify-center">
                        <button onclick="startQuiz('All')" class="flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-xl font-medium shadow-sm transition-all">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                            All Questions (Random)
                        </button>
                        <button onclick="startQuiz('Review')" class="flex items-center justify-center gap-2 bg-rose-100 hover:bg-rose-200 text-rose-700 px-6 py-3 rounded-xl font-medium shadow-sm transition-all">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Review Incorrect (${state.wrongQuestions.size})
                        </button>
                    </div>
                </div>
            `;
        }

        function renderQuiz() {
            if (state.questions.length === 0) {
                return `
                    <div class="text-center py-20 fade-in">
                        <div class="inline-block bg-emerald-100 text-emerald-600 p-4 rounded-full mb-4">
                            <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                        </div>
                        <h2 class="text-2xl font-bold text-slate-800 mb-2">Great job!</h2>
                        <p class="text-slate-500 mb-6">You have no questions to review in this category.</p>
                        <button onclick="goHome()" class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 transition-colors">Return Home</button>
                    </div>
                `;
            }

            const qData = state.questions[state.currentIndex];
            const qText = qData[0];
            const options = qData[1];
            const correctIdx = qData[2];
            const expText = qData[3];
            
            const answeredState = state.answers[state.currentIndex];
            const isAnswered = !!answeredState;

            let optionsHtml = '';
            options.forEach((opt, idx) => {
                const letter = String.fromCharCode(65 + idx);
                let btnClasses = "w-full text-left p-4 rounded-xl border-2 transition-all duration-200 mb-3 font-medium ";
                let icon = "";

                if (!isAnswered) {
                    btnClasses += "border-slate-200 bg-white hover:border-indigo-300 hover:bg-indigo-50 text-slate-700 cursor-pointer";
                } else {
                    btnClasses += "cursor-default ";
                    if (idx === correctIdx) {
                        btnClasses += "border-emerald-500 bg-emerald-50 text-emerald-800 shadow-sm";
                        icon = `<svg class="w-5 h-5 text-emerald-600 inline float-right" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>`;
                    } else if (idx === answeredState.selected) {
                        btnClasses += "border-rose-500 bg-rose-50 text-rose-800 shadow-sm";
                        icon = `<svg class="w-5 h-5 text-rose-600 inline float-right" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                    } else {
                        btnClasses += "border-slate-100 bg-slate-50 text-slate-400 opacity-60";
                    }
                }

                optionsHtml += `
                    <button class="${btnClasses}" ${!isAnswered ? `onclick="selectOption(${idx})"` : 'disabled'}>
                        <span class="font-bold mr-2 opacity-60">${letter}.</span> ${opt} ${icon}
                    </button>
                `;
            });

            return `
                <div class="fade-in max-w-3xl mx-auto">
                    <!-- Progress Bar -->
                    <div class="flex items-center justify-between mb-4">
                        <span class="text-sm font-bold text-indigo-600 uppercase tracking-wider">${state.currentTopic === 'All' ? 'Random Mix' : state.currentTopic === 'Review' ? 'Reviewing Incorrect' : state.currentTopic}</span>
                        <span class="text-sm font-medium text-slate-500 bg-slate-200 px-3 py-1 rounded-full">Question ${state.currentIndex + 1} of ${state.questions.length}</span>
                    </div>
                    
                    <div class="w-full bg-slate-200 rounded-full h-1.5 mb-8">
                        <div class="bg-indigo-600 h-1.5 rounded-full transition-all duration-300" style="width: ${((state.currentIndex + 1) / state.questions.length) * 100}%"></div>
                    </div>

                    <!-- Question Card -->
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 md:p-8 mb-6">
                        <h2 class="text-xl md:text-2xl font-semibold text-slate-800 mb-8 leading-snug">${qText}</h2>
                        <div class="space-y-1">
                            ${optionsHtml}
                        </div>

                        ${isAnswered ? `
                            <div class="mt-6 p-4 rounded-xl bg-blue-50 border border-blue-100 text-blue-900 text-sm leading-relaxed flex gap-3 fade-in">
                                <svg class="w-5 h-5 text-blue-500 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                <div><span class="font-bold block mb-1">Explanation:</span>${expText}</div>
                            </div>
                        ` : ''}
                    </div>

                    <!-- Navigation -->
                    <div class="flex justify-between items-center pb-8">
                        <button onclick="prevQuestion()" class="${state.currentIndex === 0 ? 'opacity-0 pointer-events-none' : ''} flex items-center gap-2 text-slate-500 hover:text-indigo-600 font-medium transition-colors px-4 py-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Previous
                        </button>
                        
                        <button onclick="nextQuestion()" class="${state.currentIndex === state.questions.length - 1 ? 'opacity-0 pointer-events-none' : ''} flex items-center gap-2 bg-slate-800 hover:bg-black text-white px-6 py-2.5 rounded-xl font-medium transition-colors shadow-sm">
                            Next
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                        </button>
                    </div>
                </div>
            `;
        }

        // Actions
        function startQuiz(topic) {
            state.currentTopic = topic;
            state.currentIndex = 0;
            state.answers = {};
            
            if (topic === 'All') {
                const allQs = Object.values(quizData).flat();
                state.questions = allQs.sort(() => Math.random() - 0.5); // Shuffle
            } else if (topic === 'Review') {
                state.questions = Array.from(state.wrongQuestions);
            } else {
                state.questions = [...quizData[topic]];
            }
            
            state.view = 'quiz';
            window.scrollTo(0, 0);
            render();
        }

        function goHome() {
            state.view = 'home';
            state.currentTopic = null;
            render();
        }

        function selectOption(idx) {
            if (state.answers[state.currentIndex]) return;
            
            const qData = state.questions[state.currentIndex];
            const correctIdx = qData[2];
            const isCorrect = (idx === correctIdx);

            state.answers[state.currentIndex] = {
                selected: idx,
                isCorrect: isCorrect
            };

            if (!isCorrect) {
                state.wrongQuestions.add(qData);
            } else if (state.currentTopic === 'Review') {
                // If they got it right in review mode, remove it from the wrong list
                state.wrongQuestions.delete(qData);
            }

            render();
        }

        function nextQuestion() {
            if (state.currentIndex < state.questions.length - 1) {
                state.currentIndex++;
                window.scrollTo(0, 0);
                render();
            }
        }

        function prevQuestion() {
            if (state.currentIndex > 0) {
                state.currentIndex--;
                window.scrollTo(0, 0);
                render();
            }
        }

        // Initial render
        render();
    </script>
</body>
</html>
