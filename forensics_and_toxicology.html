                                            const isAnswered = userAnswers[currentQIndex] !== undefined;
                                            const isSelected = userAnswers[currentQIndex] === idx;
                                            const isCorrect = activeQuiz[currentQIndex].a === idx;
                                            
                                            let btnClass = "w-full text-left p-4 rounded-xl border-2 transition-all duration-200 flex items-start gap-3 ";
                                            
                                            if (!isAnswered) {
                                                btnClass += "border-slate-100 bg-slate-50 hover:bg-blue-50 hover:border-blue-200 cursor-pointer";
                                            } else {
                                                if (isCorrect) {
                                                    btnClass += "border-green-500 bg-green-50 text-green-900";
                                                } else if (isSelected) {
                                                    btnClass += "border-red-400 bg-red-50 text-red-900";
                                                } else {
                                                    btnClass += "border-slate-100 bg-white opacity-50";
                                                }
                                            }

                                            return (
                                                <button 
                                                    key={idx} 
                                                    onClick={() => handleOptionClick(idx)}
                                                    className={btnClass}
                                                    disabled={isAnswered}
                                                >
                                                    <span className={`flex-shrink-0 w-6 h-6 rounded-full flex items-center justify-center text-sm font-bold border ${isAnswered ? (isCorrect ? 'bg-green-500 border-green-500 text-white' : (isSelected ? 'bg-red-500 border-red-500 text-white' : 'border-slate-300 text-slate-400')) : 'border-slate-300 text-slate-500'}`}>
                                                        {String.fromCharCode(65 + idx)}
                                                    </span>
                                                    <span className="mt-0.5 leading-snug">{opt}</span>
                                                </button>
                                            );
                                        })}
                                    </div>

                                    {userAnswers[currentQIndex] !== undefined && (
                                        <div className={`mt-6 p-5 rounded-xl border fade-in flex gap-4 ${userAnswers[currentQIndex] === activeQuiz[currentQIndex].a ? 'bg-green-50/50 border-green-200' : 'bg-red-50/50 border-red-200'}`}>
                                            <div className="flex-shrink-0 mt-0.5">
                                                {userAnswers[currentQIndex] === activeQuiz[currentQIndex].a ? (
                                                    <svg className="w-6 h-6 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                                                ) : (
                                                    <svg className="w-6 h-6 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                                                )}
                                            </div>
                                            <div>
                                                <p className={`font-bold mb-1 ${userAnswers[currentQIndex] === activeQuiz[currentQIndex].a ? 'text-green-800' : 'text-red-800'}`}>
                                                    {userAnswers[currentQIndex] === activeQuiz[currentQIndex].a ? "Correct!" : "Incorrect"}
                                                </p>
                                                <p className="text-slate-700 text-sm leading-relaxed">
                                                    {activeQuiz[currentQIndex].e}
                                                </p>
                                            </div>
                                        </div>
                                    )}
                                </div>

                                <div className="flex justify-between items-center">
                                    <button 
                                        onClick={prevQuestion}
                                        disabled={currentQIndex === 0}
                                        className="px-6 py-3 font-medium text-slate-500 hover:text-slate-800 disabled:opacity-30 disabled:hover:text-slate-500 transition"
                                    >
                                        &larr; Previous
                                    </button>
                                    
                                    <button 
                                        onClick={nextQuestion}
                                        className={`px-8 py-3 rounded-xl font-bold transition shadow-sm ${userAnswers[currentQIndex] !== undefined ? 'bg-slate-800 text-white hover:bg-slate-700 hover:shadow-md' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`}
                                        disabled={userAnswers[currentQIndex] === undefined}
                                    >
                                        {currentQIndex === activeQuiz.length - 1 ? 'Finish Quiz' : 'Next Question &rarr;'}
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* VIEW: RESULTS */}
                        {view === 'results' && (
                            <div className="fade-in max-w-2xl mx-auto py-8">
                                <div className="text-center mb-8">
                                    <div className="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                                        <svg className="w-10 h-10 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z" /></svg>
                                    </div>
                                    <h2 className="text-3xl font-bold text-slate-800 mb-1">Quiz Completed!</h2>
                                    <p className="text-slate-500">{quizTitle}</p>
                                </div>
                                
                                <div className="bg-white border border-slate-200 rounded-2xl p-8 mb-8 shadow-sm text-center">
                                    <div className="text-6xl font-black text-slate-800 mb-2">
                                        {Math.round((correctCount / activeQuiz.length) * 100)}%
                                    </div>
                                    <p className="text-slate-500 font-medium text-lg">
                                        You scored {correctCount} out of {activeQuiz.length} correct.
                                    </p>
                                </div>

                                <div className="flex flex-col sm:flex-row justify-center gap-4 mb-8">
                                    <button 
                                        onClick={() => setView('menu')}
                                        className="px-8 py-4 bg-white border border-slate-300 text-slate-700 font-bold rounded-xl hover:bg-slate-50 transition shadow-sm"
                                    >
                                        Back to Home
                                    </button>
                                </div>

                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
