        const topicsData = [
            { t: "Introduction to Forensic Medicine", qs: [
                { q: "All of the following can be used as samples for genotyping EXCEPT:", o: ["Blood", "Blood stain", "Semen stain", "Material under the nails", "Hair shafts"], a: 4, e: "Hair shafts lack nuclear DNA; hair roots/follicles are required for accurate genotyping." },
                { q: "Which of the following statements is correct regarding identification:", o: ["Distinguishing marks on the human body are an important factor in identification", "Sex determination by bone examination reaches 100% accuracy using pelvic bones", "Identification is one of the duties of the forensic physician only", "Examination of teeth and bones gives a definitive determination of age", "Blood group examination is important evidence for proving paternity or identity"], a: 0, e: "Tattoos, scars, and specific distinguishing marks are primary visual identification tools." },
                { q: "A female was recovered from a deep uncovered well; the role of the forensic doctor includes all of the following EXCEPT:", o: ["Proving or excluding violence", "Proving presence of water in air passages before or after death", "Taking samples for disease or poison analysis", "Searching for signs of sexual assault or pregnancy", "Taking necessary samples and consulting specialists to determine identity"], a: 3, e: "According to standard guidelines, police primarily establish identity while doctors focus on the physical state and cause of death." },
                { q: "You were called to investigate a homicidal case at a crime scene, what do you do:", o: ["Examine only the injured body part", "Follow the police report strictly", "Examine all of the body comprehensively", "Wait for the family's permission before proceeding"], a: 2, e: "A complete, full-body autopsy and examination is mandatory in all homicides." },
                { q: "Which of the following statements is true regarding medical consent:", o: ["Take the consent of the husband before a therapeutic abortion", "Take the patient's consent if their age is less than 13 years", "Take consent for abortion after rape without further legal steps", "Take consent from a pregnant woman in difficult labor"], a: 3, e: "Medical procedures during labor strictly require the pregnant patient's informed consent." },
                { q: "Which of the following is true about genotyping:", o: ["The most accurate sample is a hair shaft", "It is evaluated at the level of DNA", "It detects DNA products and proteins", "It is much like ABO blood grouping in its accuracy"], a: 1, e: "Genotyping is the process of determining differences in the genetic make-up (DNA) of an individual." },
                { q: "DNA analysis can be used for all of the following EXCEPT:", o: ["To identify the sex of an individual", "In cases of rape to match the suspect", "To identify missing persons", "To determine the exact age of a blood spot"], a: 3, e: "DNA does not degrade in a predictable, measurable enough manner to precisely date when a blood stain was deposited." },
                { q: "Which of the following is NOT related to the uses of Polymerase Chain Reaction (PCR):", o: ["DNA amplification", "Organization of paternity testing", "Identification of people in forensics", "General drug industry manufacturing"], a: 3, e: "PCR is a technique used to amplify small segments of DNA, not a primary tool for general drug manufacturing." },
                { q: "The practice of forensic medicine primarily depends on:", o: ["Determining why and how people harm others", "Identification of a person", "Detecting the exact time since death"], a: 1, e: "Identifying the victim and the assailant is the fundamental cornerstone of forensic investigations." },
                { q: "In DNA probing techniques for identification, we utilize:", o: ["Two specific variables", "The coding segment of DNA", "Multiple specific bands", "Polymerase chain reaction directly as the probe"], a: 2, e: "DNA probing relies on matching multiple specific band patterns (Short Tandem Repeats or STRs)." },
                { q: "According to forensic medical ethics:", o: ["The physician must exert his effort to save a life", "The physician must follow the patient's wishes absolutely", "The physician must balance between medical ethics and misuse of treatment or neglect", "All of the above"], a: 3, e: "Ethical practice requires a delicate balance of all these medical principles." },
                { q: "All of the following personnel participate in a mortuary autopsy EXCEPT:", o: ["The public prosecutor", "The police officer", "A general practitioner", "The forensic pathology specialist"], a: 2, e: "General practitioners are not trained, certified, or authorized to perform legal mortuary autopsies." }
            ]},
            { t: "Death & Postmortem Changes", qs: [
                { q: "The earliest sign of death is:", o: ["Rigor mortis", "Postmortem lividity", "Loss of skin elasticity", "Cooling of the body", "Corneal clouding"], a: 2, e: "Loss of skin elasticity (primary flaccidity) occurs almost immediately postmortem." },
                { q: "The first muscle to be involved in the onset of rigor mortis is:", o: ["Small muscles of the hand", "Orbicularis oculi", "Rectus abdominis", "Sternocleidomastoid", "Large muscles of the leg"], a: 1, e: "Rigor mortis starts in the small facial muscles (like the eyelids) first." },
                { q: "Intraocular pressure reaches zero after:", o: ["20 minutes", "40 minutes", "60 minutes", "70 minutes", "120 minutes"], a: 4, e: "Intraocular pressure drops gradually, reaching zero around 2 hours (120 min) after death." },
                { q: "The speed of appearance and disappearance of rigor mortis depends on all the following EXCEPT:", o: ["Muscle glycogen stores", "Body temperature and surrounding environment", "Muscular effort before death", "Sites of skin abrasions", "Muscle mass"], a: 3, e: "Skin abrasions are superficial injuries and have absolutely no biochemical effect on muscle rigor." },
                { q: "At what age does the human brain reach its final size and weight:", o: ["3 years", "4 years", "6 years", "7 years", "9 years"], a: 2, e: "The brain reaches nearly full adult size and weight by age 6." },
                { q: "Which of the following is NOT a cause of suspended animation:", o: ["Severe burn", "Strangulation", "Barbiturate overdose", "Drowning", "Practitioner of yoga"], a: 0, e: "Burns cause severe structural tissue destruction, not a depressed metabolic state like suspended animation." },
                { q: "Which of the following is true about rigor mortis:", o: ["It starts immediately after death", "It is faster in a cold environment", "It starts in all muscles at the same time chemically", "It is strictly due to emotional death", "It happens in voluntary muscles only"], a: 2, e: "Chemically, ATP depletion begins globally in all muscles simultaneously, though visible effects appear sequentially." },
                { q: "Adipocere is considered one of the following:", o: ["A type of mummification or preservation change", "An indication of a laceration wound", "An indication of a bone fracture", "An indication of psychiatric disease"], a: 0, e: "Adipocere (saponification) is a waxy decomposition variation, sometimes grouped broadly with preservation changes." },
                { q: "All of the following statements are true about rigor mortis EXCEPT:", o: ["It can be used to roughly know the death interval", "It starts visibly in the small muscles", "It is faster when muscles were exhausted before death", "It is delayed with extreme cold"], a: 3, e: "Cold environments actually delay the onset and prolong the duration of rigor mortis." },
                { q: "All of the following statements are true about hypostasis EXCEPT:", o: ["It can occur in a living person", "It occurs in internal organs as well as skin", "It starts after 1.5 to 2 hours of death", "It completely settles and fixes after 8 hours"], a: 0, e: "Hypostasis (livor mortis) requires the cessation of blood circulation (death)." },
                { q: "All of the following factors affect rigor mortis EXCEPT:", o: ["Muscle size and mass", "Physical activity before death", "Environmental temperature", "Bleeding severity"], a: 3, e: "Bleeding severity does not significantly alter the biochemical ATP depletion rate within the muscle cells." },
                { q: "Tache noire appears in the eyes after:", o: ["1 hour", "2 hours", "3 hours", "4 hours"], a: 2, e: "Tache noire (scleral drying and discoloration) appears in about 3 hours if the eyes remain open after death." },
                { q: "Putrefaction occurs first in which of the following organs:", o: ["Brain of an infant", "Heart", "Non-gravid uterus"], a: 0, e: "In infants, due to the high water content and soft tissue, the brain can putrefy very early." },
                { q: "Putrefaction occurs faster in which of the following mediums:", o: ["Water", "Soil", "Salt water", "Air"], a: 3, e: "Air provides oxygen and warmer temperatures, promoting bacterial growth and insect activity faster than water or soil." },
                { q: "Visible rigor mortis typically appears after:", o: ["0.5 hour", "2 hours", "3 hours", "8 hours"], a: 1, e: "Visible signs of rigor mortis typically begin to appear around 2 hours postmortem." },
                { q: "Putrefaction compared to earth occurs:", o: ["The same in air as in earth", "Two times faster in air than in earth", "Four times faster in air than in earth", "Eight times faster in air than in earth"], a: 3, e: "By Casper's dictum: putrefaction in air is 2x as fast as water, and 8x as fast as earth (1 week air = 2 weeks water = 8 weeks earth)." },
                { q: "The Kevorkian sign in forensic pathology means:", o: ["Segmentation of the retinal artery", "Rupture of a major vein", "Postmortem blood clot", "Severe arterial spasm"], a: 0, e: "Kevorkian sign refers to the visible fragmentation (box-carring) of blood in retinal vessels." },
                { q: "Postmortem lividity (hypostasis) can help you in determining:", o: ["The position of the body after death", "The exact time of death to the minute", "The exact physiological cause of death"], a: 0, e: "Blood pools dependently due to gravity, indicating the position and if the body was moved later." },
                { q: "Which of the following is NOT a feature of molecular death:", o: ["Tache noire", "Pooling of blood in vessels", "Cessation of cardiac and pulmonary function", "Rigor mortis"], a: 2, e: "Cessation of vital functions is the definition of somatic death, not molecular/cellular death." },
                { q: "Postmortem caloricity may be seen in all of the following causes of death EXCEPT:", o: ["Septicemia", "Barbiturate poisoning", "Strychnine poisoning", "Tetanus"], a: 1, e: "Barbiturates heavily depress the central nervous system and metabolism, leading to a lowered temperature, not caloricity." },
                { q: "Which of the following is true about external staining after death:", o: ["It affects all body parts equally", "It occurs primarily in dependent areas of the body"], a: 1, e: "Gravity pulls the stagnant blood to the lowest (dependent) points of the body." },
                { q: "What is generally the last organ to putrefy in a male body:", o: ["Prostate", "Brain"], a: 0, e: "The prostate (and non-gravid uterus in females) are dense, fibrous tissues and resist putrefaction the longest." },
                { q: "The cause of rigor mortis at the cellular level is:", o: ["Depletion of ATP"], a: 0, e: "Without ATP, the actin and myosin cross-bridges in the muscle cannot detach, causing stiffness." },
                { q: "The correct physiological order of events after death is:", o: ["Primary flaccidity → rigor mortis → cellular death → putrefaction"], a: 0, e: "The body goes limp, then stiffens, cells die off, and finally bacteria break the body down." },
                { q: "The most influential environmental factor on the early development of rigor mortis is:", o: ["High temperature"], a: 0, e: "Heat drastically accelerates the biochemical processes that deplete ATP." }
            ]},
            { t: "Sudden Death", qs: [
                { q: "Which of the following should NOT be recorded as an underlying cause of sudden death on a death certificate?", o: ["Hyaline membrane disease", "Cardiopulmonary arrest", "Bronchopneumonia", "Pulmonary embolism", "Acute coronary occlusion"], a: 1, e: "Cardiopulmonary arrest is a mechanism or mode of death, not a specific underlying cause." },
                { q: "Which of the following is NOT a cause of natural death?", o: ["Stab wound in the abdomen", "Subarachnoid hemorrhage", "Myocardial infarction", "Lobar pneumonia"], a: 0, e: "Stab wounds are traumatic, unnatural causes of death." },
                { q: "The standard forensic definition of sudden death is:", o: ["Death occurring within 24 hours of the appearance of the first symptom"], a: 0, e: "This is the generally accepted WHO and forensic definition for sudden, unexpected death." },
                { q: "The most common cause of sudden death in a young, otherwise healthy patient after severe exercise is:", o: ["Ruptured berry aneurysm"], a: 0, e: "Congenital aneurysm ruptures are frequently triggered by sudden spikes in blood pressure during exercise." },
                { q: "The most common overall cause of unexplained sudden death in adult females is:", o: ["Ischemic heart disease"], a: 0, e: "Ischemic heart disease remains the leading cause of sudden natural death in the adult population." },
                { q: "Which of the following physiological systems is responsible for the most common cause of sudden death?", o: ["Cardiovascular system"], a: 0, e: "Cardiac events account for the vast majority of sudden natural deaths." }
            ]},
            { t: "Electrocution & Burns", qs: [
                { q: "One of the following statements is true about the pugilistic attitude:", o: ["Flexion of the knees with extension of the hip", "Flexion of the hip with extension of the knees", "Occurs in cases of extensive severe burns", "Seen routinely in rigor mortis", "It is a positive, definitive sign of antemortem burns"], a: 2, e: "Intense heat causes muscle proteins to coagulate and contract, pulling the limbs into a flexed boxer's pose, regardless of whether the burn was before or after death." },
                { q: "One factor that significantly increases the rate of decomposition is:", o: ["Hypostasis", "Cadaveric spasm", "Heat and fire exposure", "Starvation"], a: 2, e: "Heat severely alters tissue structure and accelerates the breakdown process." },
                { q: "All of the following are considered heat artifacts in burned bodies EXCEPT:", o: ["Hemopericardium", "Slit-like wounds mimicking incised wounds", "Skin blisters", "Epidural hemorrhage", "Pugilistic position"], a: 1, e: "Slit wounds are true mechanical trauma, whereas heat can cause fake epidural hematomas or split skin." },
                { q: "The presence of carboxyhemoglobin in the blood in a burned person indicates that:", o: ["Death occurred before exposure to the fire", "The person was alive and breathing during exposure to the fire", "The person was suffering from severe anemia before the fire", "The burn severity depends on the exact fire source"], a: 1, e: "Breathing in carbon monoxide from the fire proves the victim's respiratory system was functioning during the fire." },
                { q: "One of the causes of death in domestic house fires is:", o: ["Electrical shock", "Exacerbation of medical conditions", "Carbon monoxide poisoning", "All of the above"], a: 3, e: "Domestic fires can cause death via all these direct or indirect mechanisms." },
                { q: "Death is officially attributed to electrocution due to:", o: ["Presence of an electrical burn on the skin", "Deeper tissue burns being more severe than the apparent skin burn", "Changes in muscle proteins exposed to the electric current", "Exclusion of any other cause of death combined with scene findings", "All of the above combined"], a: 4, e: "Electrocution diagnosis is comprehensive, relying on physical findings, scene context, and the exclusion of other trauma." },
                { q: "All of the following are important physical factors affecting the severity of electrocution EXCEPT:", o: ["Type of current (AC vs DC)", "Duration of exposure", "Amount of voltage", "Personal general body build", "Direction and path of the current"], a: 3, e: "Current, voltage, duration, and path through vital organs matter; general body build does not significantly alter the physics." },
                { q: "The pugilistic attitude occurs fundamentally due to:", o: ["Voluntary muscle contraction", "Coagulation of muscle proteins due to heat", "Amino acid desaturation", "Lipogenesis"], a: 1, e: "Heat denatures and coagulates muscle proteins causing severe, irreversible contraction." },
                { q: "Regarding lightning injury, which of the following statements is false:", o: ["The person is commonly found outside", "It produces an irregular bizarre distribution of lesions", "It is classified as low voltage, high current injuries"], a: 2, e: "Lightning strikes are extremely high voltage events, not low voltage." },
                { q: "All of the following indicate that the person was alive at the time of a fire EXCEPT:", o: ["Presence of generalized edema", "Carbon soot particles found deep in the lungs", "High level of carboxyhemoglobin in the blood"], a: 0, e: "CO and soot in the lungs prove active breathing; general edema is non-specific." },
                { q: "Which of the following is NOT typically seen in an electrocution mark:", o: ["Simple wide erythema around the entire body"], a: 0, e: "Electrical burns are typically pale or charred central craters with a specific narrow areola, not wide generalized erythema." },
                { q: "Which of the following findings conclusively establishes that burns were antemortem:", o: ["Elevated carboxyhemoglobin and soot particles in the airway"], a: 0, e: "This proves active inhalation of smoke and toxic gases during the actual fire." },
                { q: "Which of the following statements regarding electrocution is WRONG:", o: ["Dry skin has reduced electrical resistance"], a: 0, e: "Dry skin has very HIGH resistance; wet or sweaty skin drastically reduces resistance." }
            ]},
            { t: "Asphyxia & Drowning", qs: [
                { q: "A victim was strangled with an elbow or forearm around the neck; this specific technique is referred to as:", o: ["Incaprettamento", "Garroting", "Bansdola", "Burking", "Mugging"], a: 4, e: "Mugging or 'chokehold' utilizes the forearm and elbow to compress the neck structures." },
                { q: "Death due to suicidal hanging is diagnosed by all of the following EXCEPT:", o: ["Presence of rope marks or binding on the wrists and ankles", "Presence of a knot mark around the neck", "Presence of generalized signs of asphyxia", "Exclusion of any other cause of death"], a: 0, e: "Rope marks on extremities indicate binding and strongly suggest foul play/homicide, not suicide." },
                { q: "Smothering is diagnosed by all of the following criteria EXCEPT:", o: ["White frothy discharge from the nose and mouth", "Filling of airways and stomach with the exact same material found at the scene", "Presence of vital reactions in lungs, liver, brain, and long bones", "Exclusion of any other obvious cause of death", "All of the above criteria are used"], a: 4, e: "All these factors help confirm and differentiate smothering from natural disease or other asphyxias." },
                { q: "Suffocation caused by direct compression of the nose and mouth applies to all of the following scenarios EXCEPT:", o: ["Covering the face of a patient in a diabetic coma", "Covering the face in a poisoning-related coma", "Covering the face in an injury-related coma", "Burking", "A mother accidentally pressing on an infant's nose and mouth during breastfeeding"], a: 3, e: "Burking involves heavy compression of the chest to prevent breathing, not just covering the nose and mouth." },
                { q: "A woman was found burnt in her apartment, and the apartment was also burnt. Which of the following findings proves that death was due to the fire and not a homicide prior to the fire?", o: ["Extensive burns involving more than 90% of the body surface", "Charring of the face and head", "Presence of carboxyhemoglobin in the blood", "Pugilistic attitude"], a: 2, e: "COHb confirms the victim was alive and breathing the toxic fire fumes." },
                { q: "Which of the following can be considered the actual physiological cause of death in hanging or ligature strangulation?", o: ["Vagal nerve inhibition", "Cerebral hypoxia due to vascular occlusion in the neck", "Fracture of cervical vertebrae and spinal cord transection", "Obstruction of the upper airways", "All of the above"], a: 4, e: "Hanging can result in death via airway block, vessel block, nerve inhibition, or spinal cord severing." },
                { q: "In cases of drowning in water, livor mortis will typically be found in all the following locations EXCEPT:", o: ["Trunk", "Chest", "Hands", "Arms", "Back"], a: 4, e: "Because a floating body naturally rests face down, blood pools anteriorly (face, chest), not on the back." },
                { q: "Which of the following mechanisms of drowning is physiologically the fastest to cause death:", o: ["Fresh water drowning", "Cold water drowning", "Salt water drowning", "Near drowning"], a: 0, e: "Fresh water causes massive hemodilution, electrolyte shifting, and extremely rapid ventricular fibrillation (4-5 mins)." },
                { q: "Which of the following mechanisms of asphyxia will NOT typically cause a petechial rash in the lungs:", o: ["Throttling", "Closure of the neck by hand", "Drowning"], a: 2, e: "Petechiae (Tardieu spots) are classic in mechanical compression asphyxia, but are very rare in pure drowning." },
                { q: "Which of the following findings is typically NOT found in cases of suicidal hanging:", o: ["Deep fingernail scratches on the neck"], a: 0, e: "Scratches indicate manual throttling or the victim trying to pull away an attacker's hands, not a static hanging ligature." }
            ]},
            { t: "Wounds", qs: [
                { q: "The direction of an abrasion is determined by:", o: ["A tear in the clothes", "Epidermal skin tags", "The depth of the wound", "The spread of instrument particles", "The severity of the abrasion"], a: 1, e: "Epidermal tags pile up and point toward the distal end of the scrape." },
                { q: "The term 'brush burn' refers to:", o: ["An electrical burn", "A lightning burn", "A sliding friction abrasion", "A pressure abrasion", "A severe scald burn"], a: 2, e: "Friction against a rough surface (like road rash) removes the epidermis, causing a sliding abrasion or brush burn." },
                { q: "Which of the following statements is WRONG regarding frictional abrasions:", o: ["The force is applied strictly perpendicular to the skin", "There is low or no bleeding", "They heal quickly", "They are useful for timing the injury", "They generally have no severe complications"], a: 0, e: "Frictional abrasions strictly require a tangential (sliding) force, not perpendicular." },
                { q: "Exact determination of the age of an abrasion is done by:", o: ["Histological examination", "Naked eye examination", "Histochemical methods", "Cannot be determined accurately to the exact hour", "Can be determined exactly after 3 days"], a: 3, e: "Aging is estimated by color and scab changes, but determining the exact chronological timing is impossible." },
                { q: "Fabricated (self-inflicted) wounds to falsely accuse someone are most commonly:", o: ["Abrasions", "Stab wounds", "Incised wounds", "Contusions", "Lacerations"], a: 2, e: "People typically inflict superficial cuts (incised wounds) to fabricate assaults because they are easy to control." },
                { q: "Which of the following is WRONG about fabricated wounds:", o: ["They are often parallel", "They are multiple", "They are common on the wrist", "They result in deep, severe bruises"], a: 3, e: "Self-inflicted fabricated wounds are hesitant and superficial, avoiding deep, painful bruising." },
                { q: "One of the following statements about abrasions is correct:", o: ["Their description allows accurate determination of the time elapsed since injury", "Their description allows definite identification of the cause of injury based on distribution patterns", "The shape of abrasions always corresponds to the shape of the instrument used", "Traumatic abrasions have the same characteristics as pathological abrasions", "Neglecting to document them completely compromises proper medico-legal evaluation"], a: 4, e: "Abrasions mark exact impact sites and directions, which is crucial for crime scene reconstruction." },
                { q: "One of the following statements about traumatic incised-like wounds is correct:", o: ["Traumatic wounds are produced by drawing a sharp-edged instrument over the skin", "Contusions over areas supported by bone are one of the mechanisms producing such wounds", "Such wounds are commonly seen in suicidal cases in the neck region", "Such wounds are strictly seen in homicidal acts"], a: 1, e: "Blunt force over a firm bony ridge (like the forehead) causes the skin to split cleanly, looking exactly like a sharp cut." },
                { q: "One of the following statements about abrasions is WRONG:", o: ["They are a type of injury that does not require specific medical treatment", "They usually take longer than one month to heal", "They have important medico-legal significance", "They help in determining the vitality of the injury (ante-mortem)", "They usually heal without leaving scars"], a: 1, e: "Abrasions are superficial and typically heal much faster, usually within 1-2 weeks." },
                { q: "One of the following statements about incised wounds is NOT correct:", o: ["They can be produced during standard surgical medical procedures", "They may be seen in criminal acts in the abdominal region", "They are commonly seen in suicidal cases in the chest region", "They are seen in homicidal acts in the neck region"], a: 2, e: "Suicidal incised wounds are classically found on the wrists and neck, very rarely on the chest." },
                { q: "An unconscious patient arrived comatose to the emergency department with a contusion over the frontal area of the head. CT scan showed a linear fracture of the frontal bone. As a general practitioner, what will you tell the police?", o: ["He was definitely not involved in a quarrel", "He was hit with a large heavy stone", "He was hit with a stick", "The injuries are highly consistent with him falling on the ground", "He collided with a blunt object intentionally"], a: 3, e: "Frontal contusions coupled with linear fractures are the classic deceleration injuries resulting from a fall." },
                { q: "All of the following are classic features of lacerated wounds EXCEPT:", o: ["Contused wound margins", "Perfectly intact skin", "Tissue bridging at the depths", "A dirty wound bed", "Irregular wound edges"], a: 1, e: "Lacerations inherently involve the tearing and breaking of the skin." },
                { q: "Blunt trauma that produces a lesion closely resembling a sharp incised wound is most commonly seen at which site?", o: ["Thigh", "Abdomen", "Arm", "Back", "Forehead"], a: 4, e: "The skin is stretched tight over the firm bony skull, causing it to split cleanly under blunt force." },
                { q: "The physical severity of a contusion depends on all of the following EXCEPT:", o: ["Nature of the injured tissue", "Amount of force applied", "Nature of the blunt object", "Color of the patient's skin", "Presence of blood diseases"], a: 3, e: "Skin color affects the *visibility* of the bruise, but has no effect on the actual physiological severity of the tissue damage." },
                { q: "One of the following statements about stab wounds is correct:", o: ["There is no mathematical relation between wound depth and blade length", "Suicidal stab wounds are commonly located in the lower abdomen", "Homicidal stab wounds are strictly found in the abdomen", "Suicidal stab wounds are commonly located in the lower neck", "Wound depth always precisely equals blade length"], a: 1, e: "The lower abdomen is an easily reachable, relatively unprotected target commonly chosen in suicides." },
                { q: "One of the following statements is correct regarding lacerated wounds:", o: ["The length is always less than the width", "The width is generally less than the length", "They are considered simple wounds according to basic wound classification", "Their use is strictly confined to criminal acts", "They are unsuitable for suicide especially in the neck region"], a: 2, e: "They are classified primarily as simple tissue disruptions compared to complex penetrating injuries." },
                { q: "One of the following statements is correct about abrasions:", o: ["Abrasions tend to completely disappear within one day of injury", "Abrasions absolutely do not occur after death", "Underlying contusions are the most reliable sign of the vitality of an abrasion", "Determining the exact age of an abrasion is scientifically easy", "Abrasions cannot occur without massive contusions"], a: 2, e: "Bruising and bleeding underneath confirm the heart was beating and pushing blood during the trauma." },
                { q: "An incised wound is characterized by all of the following EXCEPT:", o: ["It is a single sharp wound", "The instrument used has a cutting edge", "The presence of hesitation cuts around the main stab wound", "The site is accessible to the hand of the victim", "The complete absence of resistance marks"], a: 0, e: "Incised wounds are frequently multiple, especially in frenzied attacks or suicides." },
                { q: "One of the following statements about contusions is correct:", o: ["The color change is due to muscle injury", "The color change is due to the breakdown of red blood cells", "They occur only in children up to 18 years", "All of the above", "None of the above"], a: 1, e: "Hemoglobin breaks down into biliverdin and bilirubin, creating the classic color shift in a bruise." },
                { q: "One of the following statements about suicidal wounds is correct:", o: ["They are extremely common among young children", "They can be technically found anywhere on the body", "They are usually multiple and extremely severe", "They are rarely associated with abrasions and contusions on the limbs", "The absence of a farewell note completely excludes suicide"], a: 1, e: "Though specific patterns exist, suicide wounds can theoretically occur anywhere the victim can reach." },
                { q: "Abrasions help in reaching all of the following medico-legal conclusions EXCEPT:", o: ["Proving definitively that the person inflicted the injury on himself with suicidal intent", "Determining the direction of the force used", "Identifying the general type and shape of the instrument if distinctive", "Estimating the approximate age of associated injuries", "Suspecting causes of death or signs of resistance"], a: 0, e: "Abrasions are surface scrapes and are rarely primarily suicidal; they heavily suggest friction, assault, or a struggle." },
                { q: "All of the following statements about incised wounds are true EXCEPT:", o: ["They can be used for standard surgical purposes", "They can be used during a medico-legal autopsy", "They can be inflicted superficially to fabricate a crime", "Deep, multiple, oblique neck wounds indicate a suicidal assailant", "Produced by drawing a sharp-edged instrument across the skin"], a: 3, e: "Deep, multiple, oblique neck wounds lacking hesitation marks strongly suggest a homicidal attack." },
                { q: "One of the following statements about suicidal cut wounds is correct:", o: ["The wrist is a rare site for suicide", "The neck is not a rare site for suicide", "Suicidal cut wounds are always deeply penetrating", "Suicidal cut wounds are very common in the upper abdomen", "It is exceptionally difficult to differentiate between suicidal and homicidal cut wounds if both are located on the neck"], a: 4, e: "Neck wounds require very careful analysis of hesitation marks, depth, and angle to differentiate suicide from homicide." },
                { q: "One of the following statements regarding injuries is correct:", o: ["There is no relation between healing duration and injury severity", "Multiple superficial abrasions contradict the classification of a simple injury", "Contusions in different body sites absolutely prove a simple injury", "A superficial incised wound in an extremity is classified as a simple injury", "A penetrating abdominal stab wound is simple if treated quickly"], a: 3, e: "Superficial cuts lacking deeper tissue, nerve, or vascular damage are legally defined as 'simple' injuries." },
                { q: "The reddish brown scab of a healing abrasion typically appears after:", o: ["A few hours", "12 hours", "1-2 days", "One week"], a: 2, e: "Exudate dries and forms a distinct, firm brown scab over a period of 24 to 48 hours." },
                { q: "Abrasions help to formally assess all of the following EXCEPT:", o: ["The specific site of injury", "The direction of injury", "The approximate age of the injury", "The internal severity of the injury"], a: 3, e: "An abrasion is superficial by definition; it cannot accurately reflect internal blunt force severity." },
                { q: "A patterned abrasion is classified under which type of abrasion:", o: ["Linear abrasion", "Pressure abrasion", "Sliding abrasion", "Graze abrasion"], a: 1, e: "A heavy perpendicular impact imprints the object's texture or shape into the skin, defining a pressure abrasion." },
                { q: "Which of the following is true about contusions:", o: ["They result directly from blood extravasation", "They are always black in color regardless of age"], a: 0, e: "Blunt force ruptures the subcutaneous capillaries, bleeding into the surrounding tissue." },
                { q: "The greenish discoloration of an aging contusion is due to:", o: ["Hemoglobin", "Hemosiderin", "Hematoidin", "Bilirubin"], a: 2, e: "Hematoidin (and Biliverdin) creates the green hue after a few days of breakdown." },
                { q: "Which of the following wounds famously shows color changes with time and results from extravasation of blood:", o: ["Abrasion", "Laceration", "Incision", "Contusion"], a: 3, e: "Bruises (contusions) famously change colors as the trapped blood degrades over time." },
                { q: "The most common type of open wound seen in the emergency department is:", o: ["Incised wound", "Lacerated wound", "Abrasion", "Contusion"], a: 1, e: "Blunt trauma lacerations (from falls and accidents) are extremely common ER presentations." },
                { q: "Which of the following is WRONG about fabricated wounds:", o: ["They are usually deep", "They are usually superficial", "They are often parallel", "They are often multiple"], a: 0, e: "They are deliberately shallow to avoid causing severe pain to the self-inflictor." },
                { q: "Pressure and friction by a sharp object on the skin primarily causes:", o: ["An abrasion", "A laceration", "An incised wound"], a: 0, e: "Friction specifically removes the epidermis, defining an abrasion." },
                { q: "In examining stab wounds, all of the following are meticulously described EXCEPT:", o: ["The site of the wounds", "The number of wounds", "The physiological effects of the injuries", "The wound length and width"], a: 2, e: "The physical forensic exam details the wound characteristics, not the physiological systemic effects." },
                { q: "Which of the following factors helps in determining the severity of the injury resulting from blunt trauma?", o: ["The mass and acceleration of the impacting body", "The nature of the tissue involved", "The angle of the impact", "All of the above"], a: 3, e: "The physics of the strike and the specific anatomy struck dictate the resulting trauma." },
                { q: "An abrasion differs from an incised wound in all of the following EXCEPT:", o: ["The presence of tissue bridges", "The presence of a contusion beneath the wound", "Irregular wound edges", "The physical loss of skin tissue"], a: 3, e: "Both mechanisms damage, slice, or physically remove the epithelial layer." },
                { q: "All of the following are features of lacerated wounds EXCEPT:", o: ["Bleeding is usually minimal", "These wounds are generally not suicidal", "The presence of skin or tissue bridges connecting the wound edges", "The underlying tissues at the wound edges are contused"], a: 0, e: "Lacerations can bleed profusely depending on the vascularity of the area (e.g., scalp lacerations)." },
                { q: "Which of the following wounds prominently shows color changes with time:", o: ["Contusion", "Laceration", "Abrasion"], a: 0, e: "RBC breakdown causes the classic shifting color palette in bruises." },
                { q: "Abrasions help to determine all of the following EXCEPT:", o: ["The approximate time of injury", "The internal severity of the injury", "The instrument used", "The direction of the applied force"], a: 1, e: "A surface scrape does not reflect internal blunt force severity." },
                { q: "Blunt trauma that may cause an incised-looking wound occurs most commonly in the:", o: ["Hand", "Chest", "Scalp"], a: 2, e: "The tight skin stretched over the hard skull splits cleanly under blunt force." }
            ]},
            { t: "Firearm Injuries", qs: [
                { q: "Regarding tattooing of the skin from a firearm, one correct statement is:", o: ["It can be easily wiped off", "It completely disappears with washing", "It cannot be removed by simple wiping or washing", "It is caused by smoke only", "It is caused by the muzzle flame"], a: 2, e: "Tattooing is unburnt gunpowder physically embedded deep into the dermis." },
                { q: "If tattoo marks are destroyed, their previous presence can be inferred by finding pigment in:", o: ["The deep dermis", "The subcutaneous tissue", "The regional lymph nodes", "The epidermis", "The hair follicles"], a: 2, e: "Local macrophages transport the foreign powder particles to the regional lymph nodes." },
                { q: "A gunshot wound to the cheek with tattooing but no burning indicates a firing distance of:", o: ["Direct contact with skin", "A few inches", "3 meters", "4 meters", "More than 4 meters"], a: 1, e: "Flames reach ~6 inches; powder reaches 2-3 feet. So tattooing without burn = intermediate range." },
                { q: "Presence of tattooing heavily concentrated only around the entry wound is seen in:", o: ["When the entry wound is supported by flat bone", "Loose tissues", "A distant shot", "A contact shot", "A close (intermediate) shot"], a: 4, e: "Close (intermediate) range allows the powder to strike the skin before completely dispersing." },
                { q: "Which of the following statements about firearm injuries is correct?", o: ["The number of entry wounds is always strictly equal to the number of exit wounds", "The exit wound is always definitively larger than the entry wound", "Presence of soot and tattooing confirms an entry wound", "Presence of more than one entry wound absolutely indicates homicidal (criminal) firing", "The bullet track inside the body helps determine the position of the victim and the shooter at the time of firing"], a: 4, e: "The internal track shows the exact 3D trajectory of the bullet at the moment of impact." },
                { q: "The entry wound of a typical firearm injury is usually characterized by:", o: ["Presence of tattooing completely around the wound margin", "Complete loss of skin tissue at the wound edges", "Inversion of the wound margins", "A perfect circular wound shape", "Presence of an abrasion collar around the wound"], a: 4, e: "The bullet stretches and rubs the skin before piercing, leaving a scraped abrasion collar." },
                { q: "Failure to observe firearm discharge effects around an entry wound is most likely due to:", o: ["Complete penetration of the bullet through the body", "The shot being fired through clothing or an intervening barrier", "Contamination of the wound edges with water", "Undirected (non-aimed) firing toward the injury site"], a: 1, e: "Clothing acts as a physical filter, catching the soot and unburnt powder before it hits the skin." },
                { q: "A stellate (star-shaped) gunshot wound is typically produced by:", o: ["A distant firearm shot", "A near-distance shot", "A contact shot over soft tissue", "A contact shot over a hard bony surface", "A shotgun injury"], a: 3, e: "Muzzle gases expand violently under the skin, hit the hard bone, and tear the skin outward into a star shape." },
                { q: "The most sensitive and reliable sign of a near-distance gunshot wound is:", o: ["Burning", "Blackening", "Tattooing", "Stippling"], a: 3, e: "Stippling (powder tattooing) confirms the muzzle was relatively close to the skin." },
                { q: "Which of the following is present in near / intermediate-range firearm injuries?", o: ["Red and pink skin only", "Tattooing of the skin", "Scorching of the skin only", "A muzzle imprint"], a: 1, e: "Unburnt powder embeds into the skin at intermediate ranges." },
                { q: "The black color at the bullet entrance in gunshot wounds is due to:", o: ["Smoke (Soot)", "Unburnt powder", "Flames"], a: 0, e: "Soot (carbon smoke) deposits heavily around the wound and can usually be wiped off." }
            ]},
            { t: "Domestic & Child Abuse", qs: [
                { q: "Which of the following is NOT a classic sign of child abuse:", o: ["A simple linear tibial fracture", "Scald burn marks just above the ankle level", "Bruises of completely different ages and stages of healing", "A gross discrepancy between the parent's history and physical findings", "Hair removed in large clumps"], a: 0, e: "A simple linear leg fracture is extremely common in toddlers falling during normal play." },
                { q: "Which of the following is the MOST common accidental injury site in children?", o: ["Ear", "Neck", "Anterior aspect of the leg (Shin)", "Inner thigh", "Abdomen"], a: 2, e: "Shins get bumped constantly as children learn to walk, run, and play." },
                { q: "One of the following is NOT a sign of recent child abuse:", o: ["A fresh rib fracture", "An oozing serum wound", "A firm adherent scar", "Bluish contused areas"], a: 2, e: "A scar indicates an old, healed injury, not a recent abusive event." },
                { q: "The least useful test to definitively indicate that rape occurred is:", o: ["A positive gonorrhea culture", "Presence of acid phosphatase in the vaginal pool", "A lacerated hymen", "Active spermatozoa"], a: 2, e: "Hymenal variations and accidental tears from sports/activities are common; it doesn't strictly prove assault." },
                { q: "Infanticide is defined legally as:", o: ["A nurse killing a newborn in a hospital", "A father killing his baby under one year of age", "A mother killing her child under one year of age", "A mother killing her child in the last week of life"], a: 2, e: "By legal and historical definition, infanticide is specifically a mother killing her infant <1 year old." },
                { q: "A raped patient arrives at the ER. Your first duty as an ER doctor is to:", o: ["Call a forensic doctor immediately", "Admit her to the hospital ward", "Take a full history and treat her medically", "Collect samples and evidence for the police"], a: 2, e: "Medical assessment, taking history, and ensuring the patient's stability always come first." },
                { q: "Child abuse is affected by all of the following EXCEPT:", o: ["The parents' race", "Bruises of different ages on the child", "Delayed seeking of medical help by the parents"], a: 0, e: "Abuse spans all demographic, socioeconomic, and racial groups equally." },
                { q: "You are in the ER; a father brings his daughter with severe sore throat. Which of the following is most consistent with child abuse?", o: ["Bruises on the thigh areas of different ages", "Severe anxiety of the child"], a: 0, e: "Multiple bruises of varying ages on soft, protected tissue (thighs) are a massive red flag." },
                { q: "A true statement about non-accidental child injury is:", o: ["Bruises in a non-walking child are highly suspicious"], a: 0, e: "Infants who can't cruise or walk don't fall, so they should virtually never have bruises." },
                { q: "Which of the following is typically not a sign of child abuse:", o: ["A forehead wound in a 2-year-old child"], a: 0, e: "Toddlers are top-heavy and frequently hit their foreheads accidentally while learning to walk." }
            ]},
            { t: "Medicolegal Reports", qs: [
                { q: "When a doctor commits fraud and gives a medical report to a person involved in a fight stating that he should be off work for 24 hours, one of the following results occurs:", o: ["The other party will immediately be sent to jail", "This patient will be treated as a victim until proven otherwise", "This means the doctor stated the patient has injuries resulting from the fight, which is a false accusation", "All of the above", "None of the above"], a: 3, e: "A false medical report severely skews the entire legal narrative and standing of the evidence." },
                { q: "As a doctor who first receives a trauma patient in the ER, the most important task you should do is:", o: ["Write specific and exact details about the injury", "Inform the police directly", "Indicate whether your report is primary or final", "Take a full medical history", "Add the estimated duration of disability"], a: 0, e: "Forensic evidence on the body fades quickly; meticulous and precise documentation is paramount." },
                { q: "A 40-year-old taxi driver sustained fractures in his right leg and right arm following a fight. The physician issued a work disability report for 3 months based on:", o: ["The nature of the patient's work", "The nature of the required medical treatment", "The nature of the injuries sustained", "The duration of healing", "All of the above"], a: 4, e: "Disability considers the holistic impact of the injury on the specific patient and their livelihood." },
                { q: "Which of the following can be used as definitive evidence in court?", o: ["A formal medical report stating that the driver was drunk", "A simple blood alcohol level test result alone"], a: 0, e: "Certified medical reports are formal, admissible legal evidence." },
                { q: "A physician is subject to severe disciplinary action for all of the following EXCEPT:", o: ["Disclosing professional secrecy related to a patient before a court upon its direct order", "Breach of fundamental professional duties", "Committing an act that harms the honor of the profession", "Violating the law", "Personal behavior that degrades the medical profession"], a: 0, e: "Court orders legally compel and protect the disclosure of confidential information." },
                { q: "In which of the following situations is the disclosure of professional secrecy considered illegal?", o: ["If disclosed with the patient's explicit consent", "Upon the request of the Minister of Health for communicable diseases", "Based on formal decisions of the public prosecutor", "Reporting diseases to the health director", "Disclosure to the husband without the wife's consent"], a: 4, e: "Spouses do not automatically have the right to confidential medical information." },
                { q: "An emergency physician issued a work disability report to one party in a fight. This legally means:", o: ["The party who received the disability is considered a victim legally until proven otherwise", "It is proof that the injured party sustained a serious injury", "The other party may request a waiver of rights", "All of the above are correct", "All of the above are incorrect"], a: 0, e: "The report gives them immediate legal standing as the injured victim." },
                { q: "When treating a child, whose consent should be obtained?", o: ["The mother appointed as the legal guardian by court order", "The paternal grandfather", "The mother if the father is traveling", "The hospital director"], a: 2, e: "The mother holds proxy consent authority in the father's absence." },
                { q: "Emergency management requires mandatory reporting to authorities EXCEPT in:", o: ["A fight resulting in a minor injury causing disability from work for 3 days", "A fight resulting in a permanent disability", "Theft resulting in disability for 27 days", "Rape", "Indecent assault"], a: 0, e: "Minor altercations (<20 days disability) often require personal complaints, not mandatory police reports." },
                { q: "Which of the following statements is NOT correct regarding the indications that may be included in a forensic report?", o: ["Determining the physical severity of the injury", "Determining the criminal intent of the act", "Estimating the duration of work disability", "Diagnosing injuries accurately", "Presenting clear forensic evidence"], a: 1, e: "Doctors purely document physical facts; the court determines criminal intent." },
                { q: "Which of the following statements is correct regarding the concept of duration of work disability?", o: ["If work disability exceeds 20 days, the act is considered a felony", "Permanent disability means disability exceeds six months", "Women's estimated duration is automatically half of men's", "The nature of the person's work is the most important factor in estimating duration"], a: 3, e: "A broken finger disables a surgeon much longer than it disables a school teacher." },
                { q: "When is it permissible to detain a physician for medical malpractice?", o: ["By a direct judicial court order", "By a simple referral to the public prosecutor", "By filing a police complaint"], a: 0, e: "Only a judge can authorize the detention for a licensed professional." },
                { q: "Which of the following is correct regarding physicians' duties toward patients' rights concerning consent?", o: ["There must be a justified medical necessity", "The physician must fully explain the nature of the disease", "The physician must explain the treatment and consequences", "All of the above"], a: 3, e: "Full informed consent encompasses all these vital disclosures." },
                { q: "All of the following are considered problems related to the forensic medical report EXCEPT:", o: ["A medical report issued for persons with permanent disability", "A medical report including the duration of work disability in assault", "A medical report including pathological tumors affecting patients", "A report related to precise anatomical description"], a: 2, e: "Pathological tumors are natural disease processes, not forensic or trauma issues." },
                { q: "As a general physician in the emergency department, once you receive a trauma patient after a fight, your immediate job is to:", o: ["Take a full medical history", "Document all injuries meticulously"], a: 1, e: "Meticulous documentation is the medical foundation of the future legal case." },
                { q: "A physician is strictly prohibited from doing the following:", o: ["Refusing to treat a patient after providing all information and investigations related to the illness"], a: 0, e: "Abandonment of care directly violates core medical ethics." },
                { q: "Which of the following statements is incorrect regarding the disability period?", o: ["A public prosecution case is initiated automatically if the disability period is one day"], a: 0, e: "Minor injuries do not automatically trigger public prosecution." }
            ]},
            { t: "Introduction to Toxicology", qs: [
                { q: "The limit of the dose-response relationship on the response axis to a substance is termed:", o: ["Potency", "Maximal efficacy", "Selectivity", "Specificity", "Margin of safety"], a: 1, e: "Efficacy is the absolute highest response achievable, regardless of dose." },
                { q: "Clinical toxicology usually deals with all of the following EXCEPT:", o: ["Investigation of diseases caused directly by toxic substances", "Treating patients poisoned by toxic substances", "Developing new techniques for medical treatment", "Investigating chronic diseases associated with toxic substances in the workplace", "Establishing physiological causes of death"], a: 3, e: "Investigating chronic/occupational diseases is usually the realm of occupational toxicology." },
                { q: "All of the following increase the toxic effect of a substance EXCEPT:", o: ["Decreasing enterohepatic circulation", "Increased gastrointestinal absorption", "Delayed elimination by the kidneys", "Increased bioavailability", "Repeated exposure to the toxin"], a: 0, e: "Decreasing the circulation speeds up clearance, significantly reducing toxicity." },
                { q: "What is true about tolerance?", o: ["It actively increases the drug effect", "It produces a shorter effect with the exact same dose", "It causes severe hypersensitivity", "It is classified as an allergic reaction", "It occurs only with toxic doses"], a: 1, e: "Tolerance means needing a higher dose for the original effect, or experiencing less effect at the same dose." },
                { q: "Severe sensitivity to a toxin with a familial genetic tendency is termed:", o: ["Tolerance", "Hypersensitivity", "Idiosyncrasy", "Tachyphylaxis", "Dependence"], a: 2, e: "Idiosyncrasy refers to abnormal, often genetic, reactions to drugs." },
                { q: "Decreased responsiveness to a substance after a prolonged period of administration is termed:", o: ["Tachyphylaxis", "Idiosyncrasy", "Tolerance", "Physical dependence", "Hypoallergy"], a: 2, e: "This is the classic definition of tolerance." },
                { q: "The following are possible causes of hypoxia in kerosene poisoning complicated by aspiration EXCEPT:", o: ["High volatility of the kerosene", "Chemical pneumonitis", "Inhibition of pulmonary surfactant", "Pulmonary edema", "Physical displacement of oxygen"], a: 0, e: "Volatility makes it easy to aspirate initially, but doesn't directly cause the physiological hypoxia in the alveoli." },
                { q: "The following are possible benefits of toxicological screening EXCEPT:", o: ["Positive results confirm the exact diagnosis", "Negative results mean absolutely no poisonous substance is present", "Documentation is excellent for medicolegal purposes", "Detection of multiple agents simultaneously", "Guiding further intensive therapy"], a: 1, e: "False negatives occur if the drug is rare or levels fall below the threshold of detection." },
                { q: "An idiosyncratic reaction to succinylcholine is due to:", o: ["Deficiency of alcohol dehydrogenase", "Deficiency of pseudocholinesterase", "Deficiency of acetylcholinesterase", "Liver enzyme induction", "Acute renal failure"], a: 1, e: "Patients lack the specific enzyme to clear it, suffering prolonged paralysis." },
                { q: "The reaction in which a non-toxic substance increases the activity of a toxic substance is called:", o: ["Potentiation", "Synergism", "Additive effect", "Antagonism"], a: 0, e: "Potentiation is when a 0 + 1 effect = 3." }
            ]},
            { t: "Management of Acute Poisoning", qs: [
                { q: "One of the following is correct about activated charcoal:", o: ["It decreases effectiveness in highly ionized toxins", "It works very well with high molecular weight toxins", "It is effective as a universal antidote for everything", "It is always completely contraindicated", "It has absolutely no role in modern poisoning management"], a: 1, e: "Charcoal physically binds large, non-polar molecules excellently." },
                { q: "One of the following is NOT correct about the primary management of poisoning:", o: ["Airway stabilization", "Breathing support", "Circulation support", "Intravenous glucose administration", "Immediate diagnosis of the specific poisoning"], a: 4, e: "Resuscitation (ABCs) always takes precedence over figuring out the exact poison." },
                { q: "The following are considered methods of dispositional antagonism EXCEPT:", o: ["Alkaline diuresis", "Dimercaprol administration", "Charcoal administration", "Enzyme induction", "Enzyme inhibition"], a: 2, e: "Charcoal works via physical binding in the gut, not by altering the drug's physiological disposition." },
                { q: "The following is true regarding acid exposure EXCEPT:", o: ["Strong acids usually produce coagulation necrosis", "Hydrofluoric acid uniquely produces liquefaction necrosis", "Emesis is completely contraindicated after ingestion", "Mild alkali is highly recommended to neutralize the acid", "The antrum of the stomach is commonly injured"], a: 3, e: "Neutralizing with an alkali causes an exothermic reaction, burning tissues far worse." },
                { q: "The following criteria favor forced diuresis EXCEPT:", o: ["Drugs with a very high volume of distribution", "Acid urine for weak basic drugs", "Basic urine for weak acidic drugs", "Low plasma protein binding", "Limited metabolism"], a: 0, e: "High Vd means the drug is deep in tissues, not the blood, so the kidneys can't filter it." },
                { q: "The best advised emetic for a 5-year-old child after ingesting many tablets is:", o: ["Sodium chloride solution", "Gag reflex stimulation", "Copper sulfate", "Apomorphine", "Syrup of ipecac"], a: 4, e: "Though outdated now, ipecac was the standard pediatric emetic historically." },
                { q: "All of the following actively increase the excretion of a substance EXCEPT:", o: ["Exchange transfusion", "Induction of emesis", "Serial charcoal", "Urine alkalinization", "Hemodialysis"], a: 1, e: "Emesis stops initial absorption; it does not excrete drugs already absorbed." },
                { q: "True regarding exposure to poison EXCEPT:", o: ["About half of adult poisoning deaths are suicide", "Most acute poisoning occurs at home", "Ingestion is the main route", "Most poisonings are accidental", "Most poisonings in young children are homicidal"], a: 4, e: "Pediatric poisonings are almost entirely accidental." },
                { q: "Activated charcoal statements are true EXCEPT:", o: ["Low molecular weight substances bind poorly", "Highly ionized poisons bind well", "Repeated doses help interrupt GI excretion", "The recommended dose is 10x the ingested poison", "Binding improves in an aqueous solution"], a: 1, e: "Charcoal struggles to bind highly ionized, small elements like Iron or Lithium." },
                { q: "Factors enhancing aspirin excretion include:", o: ["Aspirin with sodium bicarbonate", "Severe hypokalemia", "A high aspirin dose", "Chronic liver disease", "All of the above"], a: 0, e: "Bicarbonate traps the weak acid in the urine (ion trapping)." },
                { q: "A poisoned patient presents with anuria, ingested a weak acid, Vd<1 L/kg, low protein binding. The best elimination method is:", o: ["Forced alkaline diuresis", "Forced acidic diuresis", "Hemodialysis", "Charcoal hemoperfusion", "XAD-4 hemoperfusion"], a: 2, e: "Low Vd, anuria, and low protein binding make Hemodialysis perfectly effective." },
                { q: "In acute kerosene poisoning with aspiration, true management includes:", o: ["Emesis in the first hour", "Antibiotics within 8 hours", "Steroids in the first day", "Avoid oil cathartics", "Ignore fever after 3 days"], a: 3, e: "Oils increase absorption and risk of vomiting/aspiration." },
                { q: "Petroleum distillates - regarding their surface tension property:", o: ["High tension → rapid mouth spread", "Low tension → rapid spread in mouth & trachea", "Low tension → rapid intestinal absorption", "High tension → intestinal absorption", "No relation"], a: 1, e: "Low surface tension allows it to creep easily into the airway branches." },
                { q: "Which of the following is a correct drug-antidote combination:", o: ["Methadone - Naloxone", "Ethanol - 4-MP", "Protamine - Warfarin", "Vitamin K - Heparin", "Disulfiram - Ethylene glycol"], a: 1, e: "(As per PDF key) Fomepizole (4-MP) blocks alcohol dehydrogenase." },
                { q: "Which of the following is a correct antidote-poison pair:", o: ["Naloxone - Barbiturates", "Fomepizole - Ethanol", "Oxygen - Carbon dioxide", "Flumazenil - Benzodiazepines", "Disulfiram - Methanol"], a: 3, e: "Flumazenil competitively blocks the BZD receptor." },
                { q: "The appropriate antidote for severe atropine poisoning with CNS manifestations is:", o: ["Pyridostigmine", "Pyridoxine", "Pralidoxime", "Neostigmine", "Physostigmine"], a: 4, e: "Physostigmine crosses the blood-brain barrier to reverse central effects." },
                { q: "Which mechanism heavily enhances excretion in acute poisoning:", o: ["Dilution", "Cutting enterohepatic circulation via multiple dose activated charcoal", "Multiple gastric lavage", "Induced emesis", "Skin irrigation with bicarbonate"], a: 1, e: "Multiple-dose charcoal traps bile-secreted drug in the gut." },
                { q: "A patient ingested an unknown amount of kerosene. Proper management includes:", o: ["Monitor respiration closely", "Administer Castor oil", "Milk dilution", "Gastric lavage", "Olive oil"], a: 0, e: "Hydrocarbons mainly threaten the lungs via aspiration." },
                { q: "Which of the following interventions interrupts enterohepatic circulation?", o: ["Serial activated charcoal", "Peritoneal dialysis", "Hemodialysis", "Emesis"], a: 0, e: "MDAC binds the drug as it's secreted back into the intestines." },
                { q: "For a drug with an acidic pKa, what dramatically increases its excretion?", o: ["Sodium bicarbonate", "Ammonium chloride", "Acetic acid"], a: 0, e: "Alkalinizing the urine traps weak acids." },
                { q: "Which of the following is a correct drug-antidote combination:", o: ["Morphine - Methadone", "Naloxone - Heroin"], a: 1, e: "Naloxone reverses opioid (heroin) toxicity." },
                { q: "What should NOT be given to an unconscious patient in the ER:", o: ["Cocaine or other stimulants"], a: 0, e: "Never administer stimulants to an undiagnosed coma." },
                { q: "In a case of antifreeze (ethylene glycol) intoxication, the proper management includes:", o: ["Proper dose of fomepizole"], a: 0, e: "Fomepizole prevents toxic metabolite formation." },
                { q: "What is the first step in the management of carbamate insecticide poisoning:", o: ["Clear the airway then give oxygen"], a: 0, e: "ABCs always come first." },
                { q: "The effectiveness of activated charcoal in treating poisoning depends primarily on:", o: ["The specific type of poisoning"], a: 0, e: "It doesn't bind heavy metals or alcohols well." },
                { q: "In toxicology, a nomogram (like the Rumack-Matthew nomogram) is mainly used to:", o: ["Guide antidote therapy accurately based on blood levels and time"], a: 0, e: "E.g., Rumack-Matthew determines NAC necessity." }
            ]},
            { t: "Alcohol Poisoning", qs: [
                { q: "One direct cause of death in severe ethanol poisoning is:", o: ["Respiratory depression", "Cardiac arrhythmia", "Renal failure", "Hypoglycemia", "Seizures"], a: 0, e: "Ethanol causes profound CNS depression leading to apnea." },
                { q: "Ethanol tolerance is physiologically:", o: ["Independent of habitual use", "Dependent heavily on habitual use", "Seen only in young children", "Seen only in the elderly", "Genetic only"], a: 1, e: "Chronic use downregulates receptors, building pharmacodynamic tolerance." },
                { q: "Severe blindness is characteristically seen in:", o: ["Ethanol poisoning", "Isopropanol poisoning", "Methanol poisoning", "Acetone poisoning", "Kerosene poisoning"], a: 2, e: "Methanol breaks down into formic acid, damaging the optic nerve." },
