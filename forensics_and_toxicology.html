            const nextQuestion = () => {
                if (currentQIndex < activeQuiz.length - 1) {
                    setCurrentQIndex(currentQIndex + 1);
                } else {
                    setView('results');
                }
            };

            const prevQuestion = () => {
                if (currentQIndex > 0) {
                    setCurrentQIndex(currentQIndex - 1);
                }
            };

            const correctCount = Object.keys(userAnswers).filter(
                (k) => userAnswers[k] === activeQuiz[k].a
            ).length;

            return (
                <div className="min-h-screen pb-12">
                    <header className="bg-white border-b border-slate-200 shadow-sm sticky top-0 z-10">
                        <div className="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
                            <h1 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                                <svg className="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" /></svg>
                                Forensic & Tox P.Ps
                            </h1>
                            {view !== 'menu' && (
                                <button 
                                    onClick={() => setView('menu')}
                                    className="text-sm font-medium text-slate-500 hover:text-slate-800 transition"
                                >
                                    Back to Home
                                </button>
                            )}
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto px-4 mt-8">
                        {/* VIEW: MENU */}
                        {view === 'menu' && (
                            <div className="fade-in">
                                <div className="mb-8">
                                    <h2 className="text-2xl font-bold text-slate-800 mb-2">Select a Topic</h2>
                                    <p className="text-slate-500">Master all {flatQuestions.length} questions from your past papers.</p>
                                </div>
                                
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                                    <button 
                                        onClick={startRandomMaster}
                                        className="col-span-1 md:col-span-2 p-6 bg-gradient-to-r from-blue-600 to-indigo-700 rounded-2xl shadow-sm hover:shadow-md transition text-left group"
                                    >
                                        <div className="flex justify-between items-center">
                                            <div>
                                                <h3 className="text-xl font-bold text-white mb-1">Random Master Quiz</h3>
                                                <p className="text-blue-100 text-sm">All {flatQuestions.length} questions in random order</p>
                                            </div>
                                            <div className="bg-white/20 p-3 rounded-full group-hover:bg-white/30 transition">
                                                <svg className="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                                            </div>
                                        </div>
                                    </button>

                                    {incorrectQuestions.length > 0 && (
                                        <button 
                                            onClick={resolveWrongAnswers}
                                            className="col-span-1 md:col-span-2 p-6 bg-gradient-to-r from-red-500 to-rose-600 rounded-2xl shadow-sm hover:shadow-md transition text-left group"
                                        >
                                            <div className="flex justify-between items-center">
                                                <div>
                                                    <h3 className="text-xl font-bold text-white mb-1">Re-solve Incorrect Questions</h3>
                                                    <p className="text-red-100 text-sm">You have {incorrectQuestions.length} question{incorrectQuestions.length > 1 ? 's' : ''} to review and fix</p>
                                                </div>
                                                <div className="bg-white/20 p-3 rounded-full group-hover:bg-white/30 transition">
                                                    <svg className="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                                                </div>
                                            </div>
                                        </button>
                                    )}

                                    {topicsData.map((topic, idx) => (
                                        <button 
                                            key={idx}
                                            onClick={() => startTopic(idx)}
                                            className="p-5 bg-white border border-slate-200 rounded-2xl shadow-sm hover:shadow-md hover:border-blue-300 transition text-left flex justify-between items-center"
                                        >
                                            <div>
                                                <h3 className="font-semibold text-slate-800 mb-1">{topic.t}</h3>
                                                <p className="text-sm text-slate-500">{topic.qs.length} Questions</p>
                                            </div>
                                            <svg className="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" /></svg>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* VIEW: QUIZ */}
                        {view === 'quiz' && activeQuiz.length > 0 && (
                            <div className="fade-in max-w-3xl mx-auto">
                                <div className="mb-6 flex justify-between items-end">
                                    <div>
                                        <p className="text-sm font-semibold text-blue-600 uppercase tracking-wider mb-1">
                                            {quizTitle}
                                        </p>
                                        <h2 className="text-2xl font-bold text-slate-800">
                                            Question {currentQIndex + 1} <span className="text-slate-400 text-lg font-normal">of {activeQuiz.length}</span>
                                        </h2>
                                    </div>
                                </div>

                                <div className="w-full bg-slate-200 rounded-full h-2 mb-8 overflow-hidden">
                                    <div 
                                        className="bg-blue-600 h-2 transition-all duration-300 ease-out"
                                        style={{ width: `${((currentQIndex + 1) / activeQuiz.length) * 100}%` }}
                                    ></div>
                                </div>

                                <div className="bg-white border border-slate-200 rounded-2xl p-6 md:p-8 shadow-sm mb-6">
                                    <h3 className="text-lg md:text-xl font-medium text-slate-800 mb-6 leading-relaxed">
                                        {activeQuiz[currentQIndex].q}
                                    </h3>

                                    <div className="space-y-3">
                                        {activeQuiz[currentQIndex].o.map((opt, idx) => {
                                            const isAnswered = userAnswers[currentQIndex] !== undefined;
                                            const isSelected = userAnswers[currentQIndex] === idx;
                                            const isCorrect = activeQuiz[currentQIndex].a === idx;
                                            
                                            let btnClass = "w-full text-left p-4 rounded-xl border-2 transition-all duration-200 flex items-start gap-3 ";
                                            
                                            if (!isAnswered) {
                                                btnClass += "border-slate-100 bg-slate-50 hover:bg-blue-50 hover:border-blue-200 cursor-pointer";
                                            } else {
                                                if (isCorrect) {
                                                    btnClass += "border-green-500 bg-green-50 text-green-900";
                                                } else if (isSelected) {
                                                    btnClass += "border-red-400 bg-red-50 text-red-900";
                                                } else {
                                                    btnClass += "border-slate-100 bg-white opacity-50";
                                                }
                                            }

                                            return (
                                                <button 
                                                    key={idx} 
                                                    onClick={() => handleOptionClick(idx)}
                                                    className={btnClass}
                                                    disabled={isAnswered}
                                                >
                                                    <span className={`flex-shrink-0 w-6 h-6 rounded-full flex items-center justify-center text-sm font-bold border ${isAnswered ? (isCorrect ? 'bg-green-500 border-green-500 text-white' : (isSelected ? 'bg-red-500 border-red-500 text-white' : 'border-slate-300 text-slate-400')) : 'border-slate-300 text-slate-500'}`}>
                                                        {String.fromCharCode(65 + idx)}
                                                    </span>
                                                    <span className="mt-0.5 leading-snug">{opt}</span>
                                                </button>
                                            );
                                        })}
                                    </div>

                                    {userAnswers[currentQIndex] !== undefined && (
                                        <div className={`mt-6 p-5 rounded-xl border fade-in flex gap-4 ${userAnswers[currentQIndex] === activeQuiz[currentQIndex].a ? 'bg-green-50/50 border-green-200' : 'bg-red-50/50 border-red-200'}`}>
                                            <div className="flex-shrink-0 mt-0.5">
                                                {userAnswers[currentQIndex] === activeQuiz[currentQIndex].a ? (
                                                    <svg className="w-6 h-6 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                                                ) : (
                                                    <svg className="w-6 h-6 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                                                )}
                                            </div>
                                            <div>
                                                <p className={`font-bold mb-1 ${userAnswers[currentQIndex] === activeQuiz[currentQIndex].a ? 'text-green-800' : 'text-red-800'}`}>
                                                    {userAnswers[currentQIndex] === activeQuiz[currentQIndex].a ? "Correct!" : "Incorrect"}
                                                </p>
                                                <p className="text-slate-700 text-sm leading-relaxed">
                                                    {activeQuiz[currentQIndex].e}
                                                </p>
                                            </div>
                                        </div>
                                    )}
                                </div>

                                <div className="flex justify-between items-center">
                                    <button 
                                        onClick={prevQuestion}
                                        disabled={currentQIndex === 0}
                                        className="px-6 py-3 font-medium text-slate-500 hover:text-slate-800 disabled:opacity-30 disabled:hover:text-slate-500 transition"
                                    >
                                        Previous
                                    </button>
                                    
                                    <button 
                                        onClick={nextQuestion}
                                        className={`px-8 py-3 rounded-xl font-bold transition shadow-sm ${userAnswers[currentQIndex] !== undefined ? 'bg-slate-800 text-white hover:bg-slate-700 hover:shadow-md' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`}
                                        disabled={userAnswers[currentQIndex] === undefined}
                                    >
                                        {currentQIndex === activeQuiz.length - 1 ? 'Finish Quiz' : 'Next Question'}
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* VIEW: RESULTS */}
                        {view === 'results' && (
                            <div className="fade-in max-w-2xl mx-auto py-8">
                                <div className="text-center mb-8">
                                    <div className="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                                        <svg className="w-10 h-10 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z" /></svg>
                                    </div>
                                    <h2 className="text-3xl font-bold text-slate-800 mb-1">Quiz Completed!</h2>
                                    <p className="text-slate-500">{quizTitle}</p>
                                </div>
                                
                                <div className="bg-white border border-slate-200 rounded-2xl p-8 mb-8 shadow-sm text-center">
                                    <div className="text-6xl font-black text-slate-800 mb-2">
                                        {Math.round((correctCount / activeQuiz.length) * 100)}%
                                    </div>
                                    <p className="text-slate-500 font-medium text-lg">
                                        You scored {correctCount} out of {activeQuiz.length} correct.
                                    </p>
                                </div>

                                <div className="flex flex-col sm:flex-row justify-center gap-4 mb-8">
                                    <button 
                                        onClick={() => setView('menu')}
                                        className="px-8 py-4 bg-white border border-slate-300 text-slate-700 font-bold rounded-xl hover:bg-slate-50 transition shadow-sm"
                                    >
                                        Back to Home
                                    </button>
                                </div>

                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
